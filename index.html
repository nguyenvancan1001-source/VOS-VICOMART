   HELPERS
══════════════════════════════════════ */
function canView(docId) {
  if(!state.user) return false;
  const level = ROLES[state.user.role].level;
  if(level >= 3) return true; // QLCH+ sees all
  return level >= (DOC_META[docId]?.minLevel || 1);
}

function getGroup(docId) {
  return GROUPS.find(g => g.docs.includes(docId));
}

function fmtPhone(v) {
  const d = v.replace(/\D/g,'').slice(0,10);
  if(d.length<=4) return d;
  if(d.length<=7) return d.slice(0,4)+' '+d.slice(4);
  return d.slice(0,4)+' '+d.slice(4,7)+' '+d.slice(7);
}

function th() {
  return state.dark ? {
    bg:'#0d1829',card:'#162236',bd:'rgba(66,165,245,0.13)',

  return icons[name] || '';
}

function renderSearchDropdown() {
  const t = th();
  const q = state.search.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const results = ALL_DOC_KEYS.filter(id=>{
    const d = DOC_META[id];
    const h = (d.title+d.summary+d.tags.join(' ')).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    return h.includes(q) && canView(id);
  }).slice(0,8);

  return `<div style="position:absolute;top:calc(100% + 8px);right:0;width:400px;background:${t.card};border:1px solid ${t.bd};border-radius:12px;box-shadow:0 8px 32px rgba(21,101,192,0.15);z-index:100;max-height:360px;overflow-y:auto;padding:8px;" onclick="event.stopPropagation()">
    ${results.length===0?`<div style="padding:24px;text-align:center;color:${t.mut};font-size:13px;">Không tìm thấy kết quả</div>`:
    results.map(id=>{
      const d=DOC_META[id]; const g=getGroup(id);
      return `<button onclick="openDoc('${id}')" style="display:flex;gap:12px;padding:10px 12px;border-radius:9px;border:none;cursor:pointer;background:transparent;width:100%;text-align:left;font-family:'Be Vietnam Pro',sans-serif;"
        onmouseover="this.style.background='${t.inp}'" onmouseout="this.style.background='transparent'">
        <span style="font-size:22px;flex-shrink:0;">${d.icon}</span>
        <div>
          <div style="font-size:13px;font-weight:700;color:${t.txt};margin-bottom:2px;">${d.title}</div>
          <div style="font-size:11.5px;color:${t.mut};">${d.summary.slice(0,60)}...</div>
        </div>
      </button>`;
    }).join('')}
  </div>`;
}

function escapeAttr(s) {
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

let countdownTimer = null;

function handlePhoneInput(v) {
  const raw = v.replace(/\s/g,'');
  setState({loginPhone:raw, loginErr:''});
}

async function sendOTP() {
  const phone = state.loginPhone.replace(/\D/g,'');
  if(phone.length < 10) { setState({loginErr:'Số điện thoại không hợp lệ'}); return; }
  setState({loginLoading:true, loginErr:''});

  // Tìm user từ Supabase trước, fallback local
  let u = null;
  try {
    const {data} = await supabase.from('vos_users').select('*').eq('phone', phone).eq('active', true).limit(1);
    if(data && data.length > 0) {
      u = {id:data[0].id, name:data[0].name, phone:data[0].phone, role:data[0].role, branch:data[0].branch, dept:data[0].dept, avatar:data[0].avatar};
    }
  } catch(e) {}
  if(!u) u = USERS.find(x=>x.phone===phone);
  if(!u) { setState({loginLoading:false, loginErr:'Số điện thoại chưa đăng ký trong hệ thống'}); return; }

  // Tạo OTP 6 số ngẫu nhiên
  const code = String(Math.floor(100000 + Math.random() * 900000));

  // Lưu OTP vào Supabase (hết hạn sau 5 phút)
  try {
    await supabase.from('vos_otp').insert({
      phone,
      code,
      expires_at: new Date(Date.now() + 5*60*1000).toISOString(),
      used: false
    });
  } catch(e) { console.warn('OTP save error:', e); }

  setState({loginLoading:false, loginStep:'otp', loginGenOtp:code, loginPending:u, loginOtp:['','','','','',''], loginCountdown:60});
  startCountdown();
  console.log('[VOS] OTP đã gửi:', code, '(đang hiển thị trong console để test)');
}

function startCountdown() {
  clearInterval(countdownTimer);
  countdownTimer = setInterval(()=>{
    if(state.loginCountdown <= 0) { clearInterval(countdownTimer); return; }
    setState({loginCountdown: state.loginCountdown - 1});
  }, 1000);
}

function resendOTP() { setState({loginCountdown:60}); startCountdown(); }

function handleOtpInput(i, v) {
  if(!/^\d*$/.test(v)) return;
  const otp = [...state.loginOtp];
  otp[i] = v.slice(-1);
  setState({loginOtp:otp});
  if(v && i<5) document.getElementById(`otp${i+1}`)?.focus();
  if(otp.every(x=>x)) verifyOTP(otp.join(''));
}

function handleOtpKey(i, e) {
  if(e.key==='Backspace' && !state.loginOtp[i] && i>0) document.getElementById(`otp${i-1}`)?.focus();
}

async function verifyOTP(code) {
  setState({loginLoading:true, loginErr:''});
  const phone = state.loginPending?.phone;
  try {
    const res = await fetch('https://oeqvwhawayzsfxmhlfch.supabase.co/functions/v1/vos-otp?action=verify', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({phone, otp:code})
    });
    const data = await res.json();
    if(data.ok) {
      const loggedUser = state.loginPending;
      setState({loginLoading:false, user:loggedUser});
      loadUserData(loggedUser);
      return;
    }
    // Fallback check local OTP (nếu edge fn fail)
    if(code === state.loginGenOtp && state.loginGenOtp) {
      setState({loginLoading:false, user:state.loginPending});
      loadUserData(state.loginPending);
      return;
    }
    setState({loginLoading:false, loginErr:data.error||'Mã OTP không đúng', loginOtp:['','','','','','']});
    document.getElementById('otp0')?.focus();
  } catch(e) {
    if(code === state.loginGenOtp && state.loginGenOtp) {
      setState({loginLoading:false, user:state.loginPending});
      loadUserData(state.loginPending);
    } else {
      setState({loginLoading:false, loginErr:'Lỗi kết nối: '+e.message, loginOtp:['','','','','','']});
      document.getElementById('otp0')?.focus();
    }
  }
}

function navTo(page) { setState({page, selDoc:null}); }

async function openDoc(id) {
  setState({selDoc:id, page:'docs'});
  const userId = state.user?.id;
  const branch = state.user?.branch;
  if(!userId) return;
  try {
    await supabase.from('vos_doc_reads').insert({user_id:userId, doc_id:id, branch});
  } catch(e) {}
}

async function toggleBookmark(id) {
  const bm = state.bookmarks;
  const userId = state.user?.id;
  const newBm = bm.includes(id) ? bm.filter(x=>x!==id) : [...bm,id];
  setState({bookmarks: newBm});
  if(!userId) return;
  try {
    if(bm.includes(id)) {
      await supabase.from('vos_bookmarks').delete().eq('user_id',userId).eq('doc_id',id);
    } else {
      await supabase.from('vos_bookmarks').insert({user_id:userId, doc_id:id});
    }
  } catch(e) { console.warn('Bookmark sync error:', e); }
}

function handleSearch(v) { setState({search:v, searchOpen:!!v}); }

function toggleFullscreen() {
  const iframe = document.getElementById('docFrame');
  if(!iframe) return;
  if(!document.fullscreenElement) {
    iframe.requestFullscreen().catch(()=>{});
  } else {
    document.exitFullscreen();
  }
}

function sleep(ms) { return new Promise(r=>setTimeout(r,ms)); }

/* ══════════════════════════════════════
   RENDER ENGINE
══════════════════════════════════════ */

async function loadUserData(user) {
  if(!user) return;
  try {
    const {data} = await supabase.from('vos_bookmarks').select('doc_id').eq('user_id', user.id);
    if(data) setState({bookmarks: data.map(x=>x.doc_id)});
  } catch(e) {}

  // Load users mới nhất từ Supabase
  try {
    const {data} = await supabase.from('vos_users').select('*').eq('active', true);
    if(data && data.length > 0) {
      // Update USERS array
      window._vosUsers = data;
    }
  } catch(e) {}
}
function render() {
  const app = document.getElementById('app');
  if(!state.user) {
    app.innerHTML = renderLogin();
  } else {
    app.innerHTML = renderApp();
  }
  // Add keyframe for spinner
  if(!document.getElementById('kfStyle')) {
    const s = document.createElement('style');
    s.id = 'kfStyle';
    s.textContent = '@keyframes spin{to{transform:rotate(360deg)}} @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}';
    document.head.appendChild(s);
  }
}

</script>

  </div>

  <div class="card">
    <div class="card-title"><span class="art-num">1</span>Phạm vi và đối tượng áp dụng</div>
    <p>Áp dụng cho toàn bộ Cán bộ, Công nhân viên (CBCNV) đang làm việc tại các chi nhánh, cửa hàng, kho, văn phòng trực thuộc hệ thống <strong>VicoMart Retail</strong> trên toàn quốc.</p>
    <p>Bao gồm: nhân viên chính thức, thử việc, thời vụ và cộng tác viên (nếu có).</p>

  <div class="card">
    <div class="card-title"><span class="art-num">2</span>Mục đích và nguyên tắc chung</div>
    <ul>
      <li>Thiết lập cơ chế chi trả lương – thưởng – phụ cấp – phúc lợi <strong>thống nhất, công bằng, minh bạch</strong> trong toàn hệ thống.</li>
      <li>Khuyến khích và tạo động lực cho người lao động hoàn thành tốt nhiệm vụ, gắn bó lâu dài với công ty.</li>
      <li>Đảm bảo phù hợp với quy định pháp luật và chuẩn quản trị nhân sự quốc tế.</li>
      <li>Lương, thưởng và phúc lợi gắn liền với <strong>năng suất, hiệu quả và trách nhiệm cá nhân</strong>.</li>
      <li>Việc chi trả thực hiện đúng quy định của Bộ luật Lao động 2019 và các văn bản pháp luật có liên quan.</li>

  <!-- CHƯƠNG III -->
  <div id="c3" class="chapter">
    <div class="ch-pill"><span></span>CHƯƠNG III</div>
    <h2>Quy Định Thưởng</h2>
  </div>

  <div class="card">
    <div class="card-title"><span class="art-num">5</span>Thưởng trách nhiệm</div>
    <p><strong>Mục đích:</strong> Ghi nhận ý thức kỷ luật, chuyên cần và tinh thần trách nhiệm của nhân viên trong tháng làm việc.</p>
    <p style="margin-top:14px;"><strong>Điều kiện nhận thưởng</strong> — Phải đáp ứng <em>đồng thời</em> tất cả các yêu cầu sau:</p>
    <ul class="checklist">
      <li>Hoàn thành công việc được giao đúng tiến độ và tiêu chuẩn chất lượng.</li>
      <li>Không nghỉ quá <strong>4 ngày/tháng</strong> (bao gồm nghỉ phép và việc riêng).</li>
      <li>Không vi phạm nội quy, quy định, kỷ luật trong tháng.</li>
      <li>Đảm bảo tiêu chuẩn vận hành cửa hàng theo quy trình của công ty.</li>
    </ul>
    <div class="box red">
      <div class="ico">📌</div>
      <div class="bd">Nếu tổng mức phạt vi phạm nội quy trong tháng vượt quá tiền thưởng trách nhiệm → phần chênh lệch sẽ được <strong>khấu trừ trực tiếp vào lương</strong>.</div>
    </div>
    <p style="margin-top:16px;"><strong>Mức thưởng trách nhiệm hàng tháng:</strong></p>
    <table>
      <tr><th>Vị trí</th><th>Mức thưởng</th><th>Điều kiện</th></tr>
      <tr><td>Quản lý cửa hàng</td><td class="blank-cell">— Quy định riêng —</td><td>Khi đủ điều kiện</td></tr>
      <tr><td>Trợ lý / Phó quản lý</td><td class="blank-cell">— Quy định riêng —</td><td>Khi đủ điều kiện</td></tr>
      <tr><td>Nhân viên</td><td class="blank-cell">— Quy định riêng —</td><td>Khi đủ điều kiện</td></tr>
    </table>
    <p style="font-size:12.5px;color:var(--text-light);">* Mức thưởng cụ thể được xác định theo Phụ lục Lương đính kèm hoặc thông báo của Ban Giám đốc từng thời kỳ.</p>
  </div>

  <div class="card">
    <div class="card-title"><span class="art-num">6</span>Thưởng hiệu quả kinh doanh</div>
    <p><strong>Mục đích:</strong> Khuyến khích nâng cao năng suất, gắn kết lợi ích cá nhân với kết quả hoạt động của cửa hàng; ghi nhận đóng góp và tạo động lực cùng công ty phát triển bền vững.</p>
    <div class="divider"></div>
    <p><strong>Điều kiện cửa hàng đủ điều kiện chi thưởng:</strong></p>
    <ul class="checklist">
      <li>Cửa hàng đạt <strong>lợi nhuận trước thuế dương</strong> trong tháng (không bị lỗ).</li>
      <li>Kết quả kiểm kê không có sai lệch hoặc thất thoát vượt mức thưởng được phân bổ.</li>
    </ul>
    <p style="margin-top:14px;"><strong>Điều kiện nhân viên được nhận thưởng:</strong></p>
    <ul class="checklist">
      <li>Tham gia kiểm kê <strong>đầy đủ</strong> theo lịch quy định.</li>
      <li>Có thời gian làm việc <strong>tối thiểu 30 ngày</strong> tính đến thời điểm kiểm kê.</li>
      <li>Không nghỉ việc trước thời điểm kiểm kê (nghỉ trước không nhận thưởng và phải chịu trách nhiệm truy cứu thất thoát nếu có).</li>
    </ul>
    <div class="divider"></div>
    <p><strong>Tỷ lệ thưởng theo loại hợp đồng:</strong></p>
    <table>
      <tr><th>Đối tượng</th><th>Tỷ lệ thưởng</th><th>Điều kiện</th></tr>
      <tr><td>Nhân viên chính thức</td><td class="amt">100%</td><td>Làm việc từ 3 tháng trở lên</td></tr>
      <tr><td>Nhân viên phi chính thức</td><td class="amt">50%</td><td>Làm việc dưới 3 tháng</td></tr>
    </table>
    <div class="divider"></div>
    <p><strong>Công thức tính thưởng khoán hiệu quả kinh doanh:</strong></p>
    <div class="formula">
      <div class="f-title">Công thức tính thưởng HQKD</div>
      <span class="eq">Thưởng HQKD</span> <span class="op">=</span><br>
      &nbsp;&nbsp;&nbsp;<span class="var">(Mức khoán doanh thu × Hệ số thưởng)</span> <span class="op">×</span> <span class="var">Số tháng</span><br>
      &nbsp;&nbsp;&nbsp;<span class="op">−</span> <span class="var">[Giá trị thất thoát + Hư hỏng + Hàng hết hạn sử dụng]</span><br>
      &nbsp;&nbsp;&nbsp;<span class="op">−</span> <span class="var">Thưởng kỳ trước chưa khấu trừ (nếu có)</span><br>
      <br>
      <span class="cmt">// Hệ số thưởng được xác định theo quyết định kinh doanh từng kỳ</span>
    </div>
    <div class="divider"></div>
    <p><strong>Điều kiện nhận thưởng đạt mục tiêu năm:</strong></p>
    <ul class="checklist">
      <li>Quản lý làm việc liên tục đến hết <strong>ngày 30 tháng 12 Âm lịch</strong> hằng năm.</li>
      <li>Trường hợp chuyển công tác nội bộ được công ty phê duyệt → vẫn được <strong>bảo lưu thưởng doanh thu</strong> đã cộng dồn.</li>
    </ul>
    <ul class="checklist no">
      <li>Nghỉ việc trước ngày 30.12 Âm lịch → <strong>không được nhận</strong> phần thưởng cuối năm.</li>
    </ul>
    <div class="divider"></div>
    <p><strong>Quy định xử lý sai phạm trong kiểm hàng:</strong></p>
    <div class="box red">
      <div class="ico">⚠️</div>
      <div class="bd">
        <ul style="padding-left:18px;">
          <li>Mỗi mã hàng kiểm sai so với thực tế → trừ <strong>50.000 đ</strong> thưởng HQKD trong kỳ của cá nhân đó.</li>
          <li>Vi phạm nhiều lần → có thể bị hạ mức thưởng hoặc không được xét thưởng tháng đó.</li>
          <li>Vi phạm tính trung thực trong kiểm hàng → không nhận thưởng kiểm hàng kỳ đó; <strong>người đứng đầu cửa hàng chịu trách nhiệm liên đới</strong>.</li>
        </ul>
      </div>
    </div>
    <div class="divider"></div>
    <p><strong>Quy trình kiểm kê định kỳ:</strong></p>
    <p>Kiểm kê thực hiện hàng tháng, theo hình thức kiểm tra chéo. Kết quả kiểm kê là căn cứ chính thức để đánh giá và trừ thất thoát. Quản lý cửa hàng phối hợp với bộ phận Kiểm soát nội bộ và Kế toán xác nhận số liệu.</p>
    <p style="margin-top:10px;"><strong>Các nguyên nhân hàng dư không hợp lệ (không được miễn trừ):</strong></p>
    <ul class="checklist no">
      <li>Kiểm sai kỹ thuật (đếm nhầm, ghi sai số liệu).</li>
      <li>Chưa nhập đơn hàng vào hệ thống.</li>
      <li>Hàng dư không rõ nguyên nhân.</li>
      <li>Nhận hàng sai hoặc tính tiền sai so với hóa đơn.</li>
    </ul>
  </div>

  <!-- CHƯƠNG V -->
  <div id="c5" class="chapter">
    <div class="ch-pill"><span></span>CHƯƠNG V</div>
    <h2>Điều Khoản Thi Hành</h2>
  </div>

  <div class="card">
    <div class="card-title"><span class="art-num">10</span>Hiệu lực thi hành</div>
    <div class="box green">
      <div class="ico">✅</div>
      <div class="bd">
        <strong>Quy chế có hiệu lực kể từ ngày 01 tháng 01 năm 2026.</strong>
        <p>Thay thế và bãi bỏ mọi quy định trước đây trái hoặc không phù hợp với quy chế này. Mọi sửa đổi, bổ sung phải được <strong>Tổng Giám đốc phê duyệt bằng văn bản</strong> mới có giá trị thực hiện.</p>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title"><span class="art-num">11</span>Trách nhiệm thực hiện</div>
    <table>

  <div id="c7" class="chapter">
    <div class="ch-label"><span class="dot"></span>CHƯƠNG VII</div>
    <h2>Tác Phong & Thái Độ Trong Công Việc</h2>
  </div>

  <div class="art">
    <div class="art-title"><span class="art-num">15</span>Tác phong làm việc chuyên nghiệp</div>

    <p>VicoMart xây dựng đội ngũ nhân viên có <strong>tác phong chuẩn mực, thái độ tích cực và tinh thần phục vụ cao</strong>. Mỗi nhân viên là đại diện trực tiếp cho hình ảnh thương hiệu VicoMart trước khách hàng.</p>

    <div class="div"></div>

    <p><strong>Tác phong khi làm việc:</strong></p>
    <ul class="cl">
      <li>Luôn đứng thẳng, di chuyển nhanh nhẹn, không tựa vào quầy, kệ hoặc tường trong giờ làm việc.</li>
      <li>Duy trì nét mặt vui vẻ, thân thiện; nụ cười là tiêu chuẩn tối thiểu khi tiếp xúc khách hàng.</li>
      <li>Giao tiếp rõ ràng, lịch sự, xưng hô phù hợp (anh/chị/em) với khách và đồng nghiệp.</li>
      <li>Không ăn uống, nhai kẹo cao su trong khu vực bán hàng khi đang ca.</li>
      <li>Không tụ tập nói chuyện riêng quá 2 người tại một vị trí khi đang trong giờ làm việc.</li>
      <li>Không bày tỏ thái độ tiêu cực (thở dài, cáu gắt, cau mày) trước mặt khách hàng dù bất kỳ lý do gì.</li>
      <li>Chủ động, không chờ được nhắc mới làm — phát hiện việc cần làm và tự xử lý trong phạm vi trách nhiệm.</li>
    </ul>

    <div class="div"></div>

    <p><strong>Thái độ với khách hàng:</strong></p>
    <ul class="cl">
      <li>Chào khách khi vào cửa hàng và cảm ơn khi khách ra về — <em>không ngoại lệ</em>.</li>
      <li>Lắng nghe trọn vẹn khi khách phản ánh; không ngắt lời hoặc cãi lại.</li>
      <li>Với khiếu nại phức tạp: xin lỗi trước, giữ bình tĩnh, mời khách ngồi và báo ngay quản lý ca.</li>
      <li>Không phân biệt đối xử với bất kỳ khách hàng nào dựa trên ngoại hình, độ tuổi hay mức chi tiêu.</li>
      <li>Ưu tiên hỗ trợ người cao tuổi, người khuyết tật, phụ nữ có thai và trẻ em khi cần.</li>
    </ul>

    <div class="div"></div>

    <p><strong>Thái độ với đồng nghiệp và cấp trên:</strong></p>
    <ul class="cl">
      <li>Hỗ trợ đồng nghiệp khi bản thân đã hoàn thành công việc được giao — không ngoài lề đứng nhìn.</li>
      <li>Tiếp nhận góp ý, nhắc nhở từ quản lý với tinh thần cầu tiến; không biện hộ, không đổ lỗi.</li>
      <li>Phản ánh bất đồng theo kênh chính thức (trực tiếp với quản lý hoặc Phòng Nhân sự) — không bàn tán nội bộ.</li>
      <li>Tôn trọng sự phân công ca, vị trí và lịch làm việc do quản lý sắp xếp.</li>
    </ul>

    <div class="box gold">
      <div class="ico">⭐</div>
      <div class="body">
        <strong>Tiêu chí "Nhân viên xuất sắc tháng"</strong>
        <p>Tác phong và thái độ là một trong ba tiêu chí chính để bình chọn Nhân viên xuất sắc tháng, bên cạnh năng suất và không vi phạm. Nhân viên được khách hàng khen ngợi trực tiếp sẽ được ghi nhận trong hồ sơ và ưu tiên xét thưởng.</p>
      </div>
    </div>

  <!-- CHƯƠNG I -->
  <div id="c1" class="chapter">
    <div class="ch-label"><span class="dot"></span>CHƯƠNG I</div>
    <h2>Quy Định Chung</h2>
  </div>

  <div class="art">
    <div class="art-title"><span class="art-num">1</span>Phạm vi và đối tượng áp dụng</div>
    <p>Quy chế này áp dụng cho toàn bộ hoạt động tuyển dụng và hội nhập nhân viên mới tại các chi nhánh, cửa hàng, kho và văn phòng thuộc hệ thống <strong>VicoMart Retail</strong>. Bao gồm tuyển dụng từ bên ngoài lẫn điều chuyển nội bộ.</p>
  </div>

  <div class="art">
    <div class="art-title"><span class="art-num">2</span>Nguyên tắc tuyển dụng</div>
    <ul class="cl">
      <li><strong>Công bằng & minh bạch:</strong> Mọi ứng viên được đánh giá theo tiêu chí năng lực, không phân biệt giới tính, tuổi tác, tôn giáo hay địa phương.</li>
      <li><strong>Đúng người – đúng việc:</strong> Tuyển dụng dựa trên nhu cầu thực tế và bản mô tả công việc (JD) được phê duyệt.</li>
      <li><strong>Ưu tiên nội bộ:</strong> Vị trí trống được thông báo nội bộ trước ít nhất 5 ngày làm việc trước khi tuyển bên ngoài.</li>
      <li><strong>Hiệu quả chi phí:</strong> Ưu tiên kênh tuyển dụng chi phí thấp (giới thiệu nội bộ, mạng xã hội, cổng thông tin công ty) trước khi sử dụng đơn vị tuyển dụng bên ngoài.</li>
      <li><strong>Bảo mật thông tin:</strong> Hồ sơ ứng viên được bảo mật tuyệt đối, chỉ chia sẻ trong phạm vi người có thẩm quyền liên quan.</li>
    </ul>
  </div>

  <!-- CHƯƠNG II -->
  <div id="c2" class="chapter">
    <div class="ch-label"><span class="dot"></span>CHƯƠNG II</div>
    <h2>Quy Trình Tuyển Dụng</h2>
  </div>

  <div class="art">
    <div class="art-title"><span class="art-num">3</span>Xác định nhu cầu tuyển dụng</div>

    <table class="t">
      <tr><th>Bước</th><th>Nội dung</th><th>Người thực hiện</th><th>Thời gian</th></tr>
      <tr><td class="hl">1</td><td>Quản lý cửa hàng/bộ phận đề xuất nhu cầu tuyển dụng (vị trí, số lượng, lý do)</td><td>Quản lý cửa hàng</td><td>Khi phát sinh</td></tr>
      <tr><td class="hl">2</td><td>Phòng Nhân sự xem xét, soạn JD và trình phê duyệt</td><td>Phòng Nhân sự</td><td>1–2 ngày làm việc</td></tr>
      <tr><td class="hl">3</td><td>Tổng Giám đốc / Giám sát vùng phê duyệt kế hoạch tuyển dụng</td><td>Ban Giám đốc</td><td>1 ngày làm việc</td></tr>
      <tr><td class="hl">4</td><td>Phòng Nhân sự đăng tin tuyển dụng theo kênh phù hợp</td><td>Phòng Nhân sự</td><td>Ngay sau phê duyệt</td></tr>
    </table>
  </div>

  <div class="art">
    <div class="art-title"><span class="art-num">4</span>Quy trình sàng lọc và phỏng vấn</div>

    <div class="steps">
      <div class="step">
        <div class="step-num">1</div>
        <div class="step-body">
          <strong>Tiếp nhận & sàng lọc hồ sơ</strong>
          <p>Phòng Nhân sự tiếp nhận hồ sơ, sàng lọc theo tiêu chí tối thiểu của vị trí. Hồ sơ đạt được liên hệ trong vòng <strong>2 ngày làm việc</strong>.</p>
        </div>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <div class="step-body">
          <strong>Phỏng vấn vòng 1 — Nhân sự</strong>
          <p>Phỏng vấn sơ bộ (30 phút): xác nhận thông tin cá nhân, kỳ vọng lương, lịch làm việc, tính phù hợp văn hóa cơ bản.</p>
        </div>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <div class="step-body">
          <strong>Phỏng vấn vòng 2 — Chuyên môn</strong>
          <p>Quản lý trực tiếp phỏng vấn năng lực chuyên môn (45–60 phút). Có thể kết hợp bài kiểm tra thực tế tùy vị trí.</p>
        </div>
      </div>
      <div class="step">
        <div class="step-num">4</div>
        <div class="step-body">
          <strong>Đánh giá & quyết định</strong>
          <p>Hội đồng tuyển dụng thống nhất ý kiến, xếp hạng ứng viên. Quyết định tuyển dụng được thông báo trong <strong>3 ngày làm việc</strong> sau phỏng vấn.</p>
        </div>
      </div>
      <div class="step">
        <div class="step-num">5</div>
        <div class="step-body">
          <strong>Đề nghị & xác nhận</strong>
          <p>Gửi thư mời nhận việc (offer letter) kèm điều kiện làm việc. Ứng viên xác nhận bằng văn bản trong vòng <strong>3 ngày</strong>.</p>
        </div>
      </div>
      <div class="step">
        <div class="step-num">6</div>
        <div class="step-body">
          <strong>Ký hợp đồng & nhận việc</strong>
          <p>Ký hợp đồng thử việc, hoàn thiện hồ sơ nhân sự và bắt đầu chương trình onboarding.</p>
        </div>
      </div>
    </div>

    <div class="box amber">
      <div class="ico">⏱️</div>
      <div class="body">
        <strong>Thời gian tuyển dụng mục tiêu</strong>
        <p>Nhân viên cửa hàng: <strong>≤ 10 ngày</strong> từ khi đăng tin đến khi có nhân viên nhận việc. Quản lý / Trợ lý: <strong>≤ 21 ngày</strong>. Vượt mốc này, Phòng Nhân sự phải báo cáo lý do lên Ban Giám đốc.</p>
      </div>
    </div>
  </div>

  <div class="art">
    <div class="art-title"><span class="art-num">5</span>Hồ sơ nhân sự bắt buộc khi nhận việc</div>
    <table class="t">
      <tr><th>STT</th><th>Tài liệu</th><th>Bản gốc/Sao</th><th>Ghi chú</th></tr>

      <tr><td>3</td><td>Ảnh 3×4 (4 ảnh)</td><td>Bản gốc</td><td>Nền trắng, chụp trong 6 tháng</td></tr>
      <tr><td>4</td><td>Bằng cấp / chứng chỉ liên quan</td><td>Bản sao</td><td>Nếu có</td></tr>
      <tr><td>5</td><td>Giấy khám sức khỏe</td><td>Bản gốc</td><td>Trong vòng 6 tháng</td></tr>
      <tr><td>6</td><td>Số tài khoản ngân hàng</td><td>Thông tin</td><td>Để nhận lương</td></tr>
      <tr><td>7</td><td>Mã số thuế cá nhân</td><td>Thông tin</td><td>Để khai báo thuế TNCN</td></tr>
    </table>
    <div class="box red">
      <div class="ico">⚠️</div>
      <div class="body">
        <strong>Không hoàn thiện hồ sơ đúng hạn</strong>
        <p>Nhân viên phải hoàn thiện 100% hồ sơ trong vòng <strong>7 ngày làm việc</strong> kể từ ngày nhận việc. Trường hợp chậm trễ sẽ ảnh hưởng đến việc ký hợp đồng chính thức và đóng BHXH.</p>
      </div>
    </div>
  </div>

    <h2>Chương Trình Hội Nhập Nhân Viên Mới (Onboarding)</h2>
  </div>

  <div class="art">
    <div class="art-title"><span class="art-num">7</span>Tổng quan chương trình onboarding</div>

    <p>Chương trình onboarding của VicoMart được thiết kế theo lộ trình <strong>30 ngày</strong> đảm bảo nhân viên mới hiểu rõ công việc, hòa nhập với văn hóa và đạt hiệu suất độc lập trong thời gian ngắn nhất.</p>

    <div class="box blue">
      <div class="ico">🎯</div>
      <div class="body">
        <strong>Mục tiêu sau 30 ngày onboarding</strong>
        <ul style="padding-left:18px; margin-top:6px;">
          <li>Hiểu rõ sứ mệnh, giá trị cốt lõi và văn hóa VicoMart.</li>
          <li>Nắm vững quy trình vận hành cơ bản tại vị trí đảm nhận.</li>
          <li>Thực hiện công việc độc lập ≥ 80% nhiệm vụ trong JD.</li>
          <li>Xây dựng được mối quan hệ làm việc tốt với đồng nghiệp và quản lý trực tiếp.</li>
        </ul>
      </div>
    </div>
  </div>

  <div class="art">
    <div class="art-title"><span class="art-num">8</span>Lộ trình onboarding 30 ngày</div>

    <div class="timeline">

  <div id="c1" class="chapter">
    <div class="ch-label"><span class="dot"></span>CHƯƠNG I</div>
    <h2>Quy Định Chung</h2>
  </div>

  <div class="art">
    <div class="art-title"><span class="art-num">1</span>Mục đích & Triết lý thăng tiến</div>
    <div class="box gold">
      <div class="ico">🌱</div>
      <div class="body">
        <strong>VicoMart ưu tiên phát triển nhân tài từ bên trong</strong>
        <p>Mọi vị trí quản lý tại VicoMart đều được ưu tiên xét nhân sự nội bộ trước. Chúng tôi tin rằng người hiểu VicoMart nhất là người đã và đang gắn bó — đó là nền tảng để phát triển bền vững.</p>
      </div>
    </div>
    <ul style="margin-top:12px;">
      <li>Xây dựng lộ trình thăng tiến rõ ràng để nhân viên có định hướng phát triển dài hạn.</li>
      <li>Đảm bảo bổ nhiệm đúng người, đúng thời điểm dựa trên năng lực thực tế.</li>
      <li>Tạo động lực gắn bó lâu dài và giảm tỷ lệ nghỉ việc của nhân sự chất lượng cao.</li>
    </ul>
  </div>

  <div class="art">
    <div class="art-title"><span class="art-num">2</span>Nguyên tắc thăng tiến & bổ nhiệm</div>
    <ul class="cl">
      <li><strong>Năng lực trước thâm niên:</strong> Thăng tiến dựa trên năng lực thực sự, không đơn thuần dựa trên số năm làm việc.</li>
      <li><strong>Minh bạch quy trình:</strong> Tiêu chí và kết quả xét thăng tiến được thông báo rõ ràng đến người liên quan.</li>
      <li><strong>Ưu tiên nội bộ:</strong> Tất cả vị trí trống được thông báo nội bộ trước khi tuyển bên ngoài.</li>
      <li><strong>Không phân biệt:</strong> Giới tính, độ tuổi, địa phương không ảnh hưởng đến quyết định thăng tiến.</li>
      <li><strong>Có thử thách thực tế:</strong> Ứng viên thăng tiến phải trải qua đánh giá năng lực thực tế trước khi bổ nhiệm chính thức.</li>
    </ul>
  </div>

  <div id="c2" class="chapter">
    <div class="ch-label"><span class="dot"></span>CHƯƠNG II</div>
    <h2>Lộ Trình Thăng Tiến Tại VicoMart</h2>
  </div>

  <div class="art">
    <div class="art-title"><span class="art-num">3</span>Lộ trình sự nghiệp chuẩn</div>

    <div class="ladder">
      <div class="rung">
        <div class="rung-line"><div class="rung-circle" style="background:#e8f1fb;">👤</div><div class="rung-line-bar"></div></div>
        <div class="rung-content">
          <div class="r-title">Nhân viên mới (thử việc)</div>
          <div class="r-req">Học việc, hoàn thành onboarding 30 ngày, đạt đánh giá thử việc.</div>
          <span class="r-time">Tháng 1</span>
        </div>
      </div>
      <div class="rung">
        <div class="rung-line"><div class="rung-circle" style="background:#ddeeff;">🛒</div><div class="rung-line-bar"></div></div>
        <div class="rung-content">
          <div class="r-title">Nhân viên chính thức</div>
          <div class="r-req">Ký HĐLĐ chính thức, thành thạo công việc, KPI ổn định ≥ B.</div>
          <span class="r-time">Tháng 2 – 12</span>
        </div>
      </div>
      <div class="rung">
        <div class="rung-line"><div class="rung-circle" style="background:#c5d8f0;">⭐</div><div class="rung-line-bar"></div></div>
        <div class="rung-content">
          <div class="r-title">Nhân viên cốt cán (Buddy / Mentor)</div>
          <div class="r-req">KPI ≥ A liên tiếp 3 tháng, thâm niên ≥ 6 tháng, được tin tưởng kèm cặp nhân viên mới.</div>
          <span class="r-time">Tháng 6 – 18</span>
        </div>
      </div>
      <div class="rung">
        <div class="rung-line"><div class="rung-circle" style="background:#a8c8f0;">🎯</div><div class="rung-line-bar"></div></div>
        <div class="rung-content">
          <div class="r-title">Trưởng ca / Tổ trưởng</div>
          <div class="r-req">KPI ≥ A liên tiếp 6 tháng, thâm niên ≥ 1 năm, có khả năng điều phối nhóm nhỏ trong ca.</div>
          <span class="r-time">Năm 1 – 2</span>
        </div>
      </div>
      <div class="rung">
        <div class="rung-line"><div class="rung-circle" style="background:#1e88e5;">📋</div><div class="rung-line-bar"></div></div>
        <div class="rung-content">
          <div class="r-title">Trợ lý Quản lý</div>
          <div class="r-req">KPI ≥ A liên tiếp 6 tháng, thâm niên ≥ 1.5 năm, hoàn thành đào tạo kỹ năng quản lý cơ bản.</div>
          <span class="r-time">Năm 1.5 – 3</span>
        </div>
      </div>
      <div class="rung">
        <div class="rung-line"><div class="rung-circle" style="background:#1565c0;">🏆</div><div class="rung-line-bar"></div></div>
        <div class="rung-content">
          <div class="r-title">Quản lý cửa hàng</div>
          <div class="r-req">KPI ≥ A liên tiếp 6 tháng với tư cách Trợ lý, thâm niên ≥ 2.5 năm, qua đánh giá năng lực quản lý.</div>
          <span class="r-time">Năm 2.5 – 5</span>
        </div>
      </div>
      <div class="rung">
        <div class="rung-line"><div class="rung-circle" style="background:#0a3d6b;">🌟</div></div>
        <div class="rung-content">
          <div class="r-title">Giám sát vùng / Ban Giám đốc</div>
          <div class="r-req">Thành tích xuất sắc liên tục, lãnh đạo thành công ≥ 1 cửa hàng, tầm nhìn chiến lược, được Ban Giám đốc đề xuất.</div>
          <span class="r-time">Năm 4 trở lên</span>
        </div>
      </div>
    </div>
    <p style="font-size:12.5px;color:var(--text-soft);">* Lộ trình trên là định hướng tham khảo. Nhân viên xuất sắc có thể được rút ngắn thời gian thăng tiến dựa trên đánh giá thực tế của Ban Giám đốc.</p>
  </div>

  <div id="c3" class="chapter">
    <div class="ch-label"><span class="dot"></span>CHƯƠNG III</div>
    <h2>Tiêu Chuẩn Xét Thăng Tiến</h2>
  </div>

  <div class="art">
    <div class="art-title"><span class="art-num">4</span>Điều kiện bắt buộc để được xét thăng tiến</div>
    <table class="t">
      <tr><th>Tiêu chí</th><th>Lên Trưởng ca / Tổ trưởng</th><th>Lên Trợ lý QL</th><th>Lên Quản lý CH</th></tr>
      <tr><td>Thâm niên tối thiểu tại vị trí hiện tại</td><td class="hl">6 tháng</td><td class="hl">12 tháng</td><td class="hl">18 tháng (với tư cách Trợ lý)</td></tr>
      <tr><td>KPI tối thiểu</td><td class="hl">A liên tiếp 3 tháng</td><td class="hl">A liên tiếp 6 tháng</td><td class="hl">A liên tiếp 6 tháng</td></tr>
      <tr><td>Không vi phạm kỷ luật</td><td class="hl">6 tháng gần nhất</td><td class="hl">12 tháng gần nhất</td><td class="hl">12 tháng gần nhất</td></tr>
      <tr><td>Hoàn thành đào tạo bắt buộc</td><td>Đào tạo kỹ năng cơ bản</td><td>Đào tạo quản lý cấp 1</td><td>Đào tạo quản lý cấp 2 + thực tế phụ trách cửa hàng</td></tr>
      <tr><td>Đánh giá từ quản lý trực tiếp</td><td>Đề xuất bằng văn bản</td><td>Đề xuất + phỏng vấn năng lực</td><td>Đề xuất + phỏng vấn Ban GĐ</td></tr>
    </table>
  </div>

  <div class="art">
    <div class="art-title"><span class="art-num">5</span>Điều kiện loại trừ (không được xét thăng tiến)</div>
    <ul class="cl" style="--cl-color:var(--red);">
      <li>Đang trong thời gian thực hiện Kế hoạch Cải thiện Hiệu suất (PIP).</li>
      <li>Có kỷ luật từ mức cảnh cáo trở lên trong vòng 12 tháng gần nhất.</li>
      <li>Chưa hoàn thành đầy đủ hồ sơ nhân sự theo quy định.</li>
      <li>Đang trong thời gian thử việc hoặc chưa ký HĐLĐ chính thức.</li>
      <li>Có hành vi không trung thực trong báo cáo, kiểm kê hoặc đánh giá KPI.</li>
    </ul>
  </div>

  <div id="c4" class="chapter">
    <div class="ch-label"><span class="dot"></span>CHƯƠNG IV</div>
    <h2>Quy Trình Bổ Nhiệm</h2>
  </div>

  <div class="art">
    <div class="art-title"><span class="art-num">6</span>Các bước bổ nhiệm</div>
    <table class="t">
      <tr><th>Bước</th><th>Nội dung</th><th>Người thực hiện</th><th>Thời gian</th></tr>
      <tr><td class="hl">1</td><td>Phát sinh nhu cầu vị trí hoặc Phòng NS chủ động rà soát nhân tài hàng quý</td><td>Quản lý / Phòng NS</td><td>Liên tục</td></tr>
      <tr><td class="hl">2</td><td>Lập danh sách ứng viên nội bộ đủ điều kiện; thông báo nội bộ công khai</td><td>Phòng NS</td><td>3 ngày làm việc</td></tr>
      <tr><td class="hl">3</td><td>Ứng viên nộp đơn ứng tuyển (tự nguyện hoặc theo đề cử)</td><td>Ứng viên</td><td>5 ngày làm việc</td></tr>
      <tr><td class="hl">4</td><td>Đánh giá năng lực: bài test + phỏng vấn chuyên môn với Hội đồng</td><td>Hội đồng xét bổ nhiệm</td><td>3–5 ngày làm việc</td></tr>
      <tr><td class="hl">5</td><td>Hội đồng thống nhất quyết định; trình Ban Giám đốc phê duyệt</td><td>BGĐ</td><td>2 ngày làm việc</td></tr>
      <tr><td class="hl">6</td><td>Ban hành Quyết định bổ nhiệm; thông báo toàn bộ nhân viên liên quan</td><td>Phòng NS</td><td>1 ngày</td></tr>
      <tr><td class="hl">7</td><td>Bàn giao công việc có biên bản; bắt đầu giai đoạn thử thách bổ nhiệm (3 tháng)</td><td>Quản lý cũ + mới</td><td>Trong vòng 5 ngày</td></tr>
    </table>

    <div class="box amber">
      <div class="ico">⏳</div>
      <div class="body">
        <strong>Giai đoạn thử thách bổ nhiệm — 3 tháng đầu</strong>
        <p>Nhân viên mới được bổ nhiệm sẽ có <strong>3 tháng thử thách</strong> tại vị trí mới. Được đánh giá riêng và hỗ trợ đặc biệt từ quản lý cấp trên. Nếu không đáp ứng được trong 3 tháng → xem xét giữ nguyên vị trí cũ hoặc điều chỉnh phù hợp.</p>
      </div>
    </div>
  </div>

  <div id="c5" class="chapter">
    <div class="ch-label"><span class="dot"></span>CHƯƠNG V</div>
    <h2>Miễn Nhiệm & Điều Chuyển Nội Bộ</h2>
  </div>

  <div class="art">
    <div class="art-title"><span class="art-num">7</span>Các trường hợp miễn nhiệm</div>
    <table class="t">
      <tr><th>Trường hợp</th><th>Quy trình xử lý</th></tr>
      <tr><td>KPI 3 tháng liên tiếp ≤ C tại vị trí quản lý</td><td>Phòng NS đề xuất điều chỉnh vị trí hoặc xuống chức; BGĐ phê duyệt.</td></tr>
      <tr><td>Vi phạm kỷ luật nghiêm trọng</td><td>Miễn nhiệm ngay lập tức theo quyết định kỷ luật; bàn giao công việc trong 24h.</td></tr>
      <tr><td>Tự nguyện xin thôi vị trí</td><td>Nộp đơn bằng văn bản trước 15 ngày; bàn giao đầy đủ trước khi bàn giao chính thức.</td></tr>
      <tr><td>Yêu cầu tổ chức (tái cơ cấu)</td><td>Thông báo trước tối thiểu 30 ngày; ưu tiên điều chuyển sang vị trí phù hợp.</td></tr>
    </table>
  </div>

  <div class="art">
    <div class="art-title"><span class="art-num">8</span>Điều chuyển công tác nội bộ</div>
    <div class="box blue">
      <div class="ico">🔄</div>
      <div class="body">
        <strong>Điều chuyển vì nhu cầu tổ chức</strong>
        <p>Công ty có quyền điều chuyển nhân viên giữa các cửa hàng/bộ phận khi có nhu cầu tổ chức. Nhân viên được thông báo trước <strong>tối thiểu 7 ngày làm việc</strong> và có quyền trình bày khó khăn cá nhân. Điều chuyển không ảnh hưởng đến quyền lợi lương, thưởng tích lũy đã có.</p>
      </div>
    </div>
    <div class="box gold">
      <div class="ico">✋</div>
      <div class="body">
        <strong>Điều chuyển theo nguyện vọng cá nhân</strong>
        <p>Nhân viên muốn chuyển chi nhánh/bộ phận có thể nộp đơn lên Phòng Nhân sự. Xem xét dựa trên nhu cầu thực tế, thâm niên và kết quả KPI. Chấp thuận trong vòng 15 ngày làm việc kể từ ngày nộp đơn.</p>
      </div>
    </div>
  </div>

  <div id="c6" class="chapter">
    <div class="ch-label"><span class="dot"></span>CHƯƠNG VI</div>
    <h2>Điều Khoản Thi Hành</h2>
  </div>

    <div class="art-title"><span class="art-num">9</span>Hiệu lực & Trách nhiệm</div>

  <div id="c2" class="ch"><div class="chl"><span class="dot"></span>CHƯƠNG II</div><h2>Quy Trình Mở Cửa Hàng (Ca 1 — 06:20 đến 07:00)</h2></div>

    </table>
    <div class="bx rd"><div class="ic">🚫</div><div class="bd2"><strong>Không nhận hàng ngoài khung giờ quy định</strong><p>NCC giao hàng ngoài giờ → nhân viên từ chối nhận và hẹn lịch lại. Trường hợp đặc biệt phải có phê duyệt bằng văn bản của Quản lý cửa hàng.</p></div></div>
  </div>

  <div class="art">
    <div class="at"><span class="an">3</span>Điều kiện xe giao hàng & nhân viên giao hàng</div>
    <ul>
      <li>Xe giao hàng tươi/lạnh phải có <strong>thùng bảo ôn hoặc xe lạnh</strong> — không nhận hàng lạnh từ xe thường.</li>
      <li>Nhân viên giao hàng phải có <strong>phiếu giao hàng (delivery note) và hóa đơn</strong> — không nhận hàng không có chứng từ.</li>
      <li>Không để nhân viên NCC vào khu vực kho hoặc khu vực bán hàng khi chưa được phép.</li>
      <li>Khu vực nhận hàng phải sạch sẽ, thông thoáng trước khi hàng đến.</li>
    </ul>
  </div>

  <div id="c3" class="ch"><div class="chl"><span class="dot"></span>CHƯƠNG III</div><h2>Quy Trình Kiểm Hàng</h2></div>
  <div class="art">
    <div class="at"><span class="an">4</span>7 bước kiểm hàng chuẩn</div>
    <div class="steps">
      <div class="step">
        <div class="sn2">1</div>
        <div class="sb">
          <strong>Đối chiếu chứng từ</strong>
          <p>Nhận phiếu giao hàng từ NCC, đối chiếu với Đơn đặt hàng (PO) đã được phê duyệt: tên NCC, mã hàng, số lượng, đơn giá.</p>
          <span class="stag">Bắt buộc trước khi chạm vào hàng</span>
        </div>
      </div>
      <div class="step">
        <div class="sn2">2</div>
        <div class="sb">
          <strong>Kiểm tra bao bì & tình trạng vận chuyển</strong>
          <p>Kiểm tra thùng carton/bao bì: không rách, không ẩm, không bị đè bẹp, không có dấu hiệu mở ra. Hàng đông lạnh: kiểm tra nhiệt độ xe giao ngay khi mở cửa xe.</p>
          <span class="stag rd">Hàng bao bì hỏng → từ chối ngay hoặc ghi chú và từ chối ký đủ số lượng</span>
        </div>
      </div>
      <div class="step">
        <div class="sn2">3</div>
        <div class="sb">
          <strong>Kiểm tra hạn sử dụng (HSD)</strong>
          <p>100% sản phẩm phải được kiểm tra HSD. Tiêu chuẩn nhận hàng tối thiểu:</p>
          <ul style="padding-left:18px;margin-top:4px;font-size:13.5px;">
            <li>Hàng khô, FMCG: còn ≥ <strong>2/3 tổng thời hạn sử dụng</strong></li>
            <li>Hàng tươi sống, chế biến: còn ≥ <strong>3 ngày</strong></li>
            <li>Hàng đông lạnh: còn ≥ <strong>30 ngày</strong></li>
          </ul>
          <span class="stag rd">Không đạt HSD → từ chối toàn bộ lô hàng đó</span>
        </div>
      </div>
      <div class="step">
        <div class="sn2">4</div>
        <div class="sb">
          <strong>Kiểm đếm số lượng</strong>
          <p>Đếm số lượng thực tế từng mã hàng, đối chiếu với phiếu giao. Ghi chênh lệch vào phiếu kiểm hàng. Không ký nhận số lượng lớn hơn thực tế nhận được.</p>
          <span class="stag">Phải có ít nhất 2 người: 1 đếm, 1 ghi</span>
        </div>
      </div>
      <div class="step">
        <div class="sn2">5</div>
        <div class="sb">
          <strong>Kiểm tra chất lượng cảm quan</strong>
          <p>Hàng tươi: màu sắc, mùi, độ tươi. Hàng đóng gói: không phồng, không móp méo bất thường, nhãn dán nguyên vẹn. Hàng điện: không trầy xước, đủ phụ kiện.</p>
          <span class="stag rd">Hàng không đạt chất lượng → ghi biên bản từ chối</span>
        </div>
      </div>
      <div class="step">
        <div class="sn2">6</div>
        <div class="sb">
          <strong>Ký nhận và ghi phiếu</strong>
          <p>Ký vào phiếu giao hàng của NCC <strong>chỉ với số lượng và mã hàng đạt yêu cầu</strong>. Ghi rõ hàng từ chối (nếu có) vào phiếu và yêu cầu NCC ký xác nhận.</p>
          <span class="stag gr">Lưu 1 bản phiếu giao hàng tại cửa hàng</span>
        </div>
      </div>
      <div class="step">
        <div class="sn2">7</div>
        <div class="sb">
          <strong>Nhập hàng vào hệ thống</strong>
          <p>Nhập dữ liệu vào phần mềm quản lý kho ngay trong ngày nhận hàng. Không để tồn đọng sang ngày hôm sau. Kiểm tra số tồn kho sau khi nhập khớp với thực tế.</p>
          <span class="stag">Hoàn thành trước 14:00 cùng ngày</span>
        </div>
      </div>
    </div>
  </div>

  <div class="art">
    <div class="at"><span class="an">5</span>Tiêu chuẩn kiểm hàng theo nhóm</div>
    <table class="t">
      <tr><th>Nhóm hàng</th><th>Kiểm tra đặc thù</th><th>HSD tối thiểu</th><th>Nhiệt độ (nếu có)</th></tr>
      <tr><td><strong>Rau củ quả tươi</strong></td><td>Màu sắc tự nhiên, không dập nát >10%, không có mùi lạ</td><td>3 ngày</td><td>Không áp dụng</td></tr>
      <tr><td><strong>Thịt, cá tươi</strong></td><td>Màu đỏ hồng tươi, không nhớt, không mùi, đúng trọng lượng</td><td>Dùng trong ngày / 1–2 ngày</td><td>≤ 5°C</td></tr>
      <tr><td><strong>Sữa, sản phẩm sữa</strong></td><td>Bao bì không phồng, không móp, nhãn nguyên vẹn</td><td>2/3 tổng HSD</td><td>2–8°C</td></tr>
      <tr><td><strong>Đông lạnh</strong></td><td>Không có tinh thể đá lớn (dấu hiệu đông lại), bao bì nguyên vẹn</td><td>30 ngày</td><td>≤ -18°C</td></tr>
      <tr><td><strong>Hàng khô, FMCG</strong></td><td>Bao bì nguyên vẹn, mã vạch đọc được, nhãn tiếng Việt đầy đủ</td><td>2/3 tổng HSD</td><td>Không áp dụng</td></tr>
      <tr><td><strong>Hóa phẩm, tẩy rửa</strong></td><td>Không bị rò rỉ, nắp kín, nhãn nguyên vẹn</td><td>6 tháng còn lại</td><td>Không áp dụng</td></tr>
    </table>
  </div>

  <div id="c4" class="ch"><div class="chl"><span class="dot"></span>CHƯƠNG IV</div><h2>Nhập Kho & Lên Kệ</h2></div>
  <div class="art">
    <div class="at"><span class="an">6</span>Nguyên tắc FIFO và sắp xếp kho</div>
    <div class="bx gr"><div class="ic">📦</div><div class="bd2">
      <strong>FIFO — First In First Out (Nhập trước, Xuất trước)</strong>
      <p>Hàng nhập mới luôn được xếp <strong>phía sau</strong> hàng cũ còn trong kho/trên kệ. Khi lấy hàng lên kệ, luôn đẩy hàng cũ ra phía trước. Đây là nguyên tắc bất di bất dịch — vi phạm FIFO là vi phạm vận hành nghiêm trọng.</p>
    </div></div>
    <ul>
      <li>Dán nhãn ngày nhập lên mỗi thùng hàng trước khi xếp vào kho.</li>
      <li>Kho sắp xếp theo nhóm hàng, có lối đi thông thoáng tối thiểu 80cm.</li>
      <li>Hàng nặng, cồng kềnh xếp dưới; hàng nhẹ xếp trên.</li>
      <li>Hàng tươi sống, đông lạnh nhập kho lạnh ngay sau khi kiểm tra — không để ở ngoài quá <strong>15 phút</strong>.</li>
      <li>Không xếp hàng trực tiếp trên sàn — sử dụng pallet hoặc kệ.</li>
    </ul>
  </div>

  <div id="c5" class="ch"><div class="chl"><span class="dot"></span>CHƯƠNG V</div><h2>Từ Chối & Trả Hàng NCC</h2></div>
  <div class="art">
    <div class="at"><span class="an">7</span>Các trường hợp từ chối nhận hàng</div>
    <table class="t">
      <tr><th>Lý do từ chối</th><th>Hành động</th><th>Chứng từ cần lập</th></tr>
      <tr><td>Hàng không có trong PO</td><td class="rd">Từ chối toàn bộ, không nhận dù 1 đơn vị</td><td>Ghi vào nhật ký nhận hàng</td></tr>
      <tr><td>Không đủ HSD tối thiểu</td><td class="rd">Từ chối lô hàng không đạt, nhận phần đạt (nếu có)</td><td>Biên bản từ chối hàng</td></tr>
      <tr><td>Số lượng giao thiếu so với PO</td><td>Nhận số lượng thực, ghi rõ thiếu bao nhiêu, yêu cầu NCC bổ sung</td><td>Phiếu giao hàng ghi chú chênh lệch</td></tr>
      <tr><td>Hàng bị hỏng, dập, biến chất</td><td class="rd">Từ chối phần bị hỏng, chụp ảnh làm bằng chứng</td><td>Biên bản từ chối + ảnh chụp</td></tr>
      <tr><td>Giá không khớp hợp đồng</td><td>Nhận hàng tạm thời, giữ lại phiếu, báo cáo Phòng Mua hàng xử lý</td><td>Ghi chú giá chênh lệch vào phiếu</td></tr>
    </table>
    <div class="bx am"><div class="ic">📸</div><div class="bd2"><strong>Bắt buộc chụp ảnh khi từ chối hàng</strong><p>Mọi trường hợp từ chối hàng phải <strong>chụp ảnh rõ ràng</strong> phần hàng bị từ chối và gửi vào nhóm Zalo quản lý ngay lập tức. Ảnh là bằng chứng quan trọng trong trường hợp tranh chấp với NCC.</p></div></div>
  </div>

  <div id="c6" class="ch"><div class="chl"><span class="dot"></span>CHƯƠNG VI</div><h2>Hiệu Lực & Trách Nhiệm</h2></div>
  <div class="art">
    <div class="at"><span class="an">8</span>Trách nhiệm thực hiện</div>
    <div class="bx bl"><div class="ic">✅</div><div class="bd2"><strong>Hiệu lực từ 01/01/2026.</strong><p>Mọi vi phạm quy trình nhận hàng (ký nhận không kiểm tra, nhận hàng ngoài giờ không phép, không nhập hệ thống trong ngày) sẽ bị xử lý kỷ luật theo quy chế làm việc.</p></div></div>
    <table class="t" style="margin-top:14px;">
      <tr><th>Vai trò</th><th>Trách nhiệm</th></tr>
      <tr><td class="hl">NV nhận hàng / kho</td><td>Thực hiện đúng 7 bước kiểm hàng; nhập hệ thống đúng hạn; báo cáo sự cố ngay.</td></tr>
      <tr><td class="hl">Quản lý ca</td><td>Giám sát quy trình kiểm hàng; ký duyệt biên bản từ chối; đảm bảo NCC không vào khu vực cấm.</td></tr>
      <tr><td class="hl">Phòng Mua hàng</td><td>Phát hành PO trước khi hàng giao; xử lý tranh chấp giá và số lượng với NCC.</td></tr>
    </table>
  </div>

</div>

</body>

<style>
  :root{--p:#0a3d6b;--pm:#1565c0;--pl:#1e88e5;--pp:#e8f1fb;--pa:#2979ff;--gold:#c9a84c;--gl:#fdf3d8;--red:#c0392b;--rl:#fdecea;--amb:#d35400;--al:#fef0e6;--grn:#1a7a3c;--grl:#e8f7ef;--td:#1a1a1a;--tm:#3d3d3d;--ts:#6b7280;--bg:#f5f8fd;--wh:#fff;--bd:#c5d8f0;--r:12px;}

  body{font-family:'Be Vietnam Pro',sans-serif;background:var(--bg);color:var(--td);line-height:1.75;font-size:15px;}
  .hdr{background:linear-gradient(140deg,#051e3e 0%,#0a3d6b 45%,#1565c0 100%);color:#fff;position:relative;overflow:hidden;}
  .hdr::before{content:'';position:absolute;top:-100px;right:-100px;width:400px;height:400px;background:rgba(255,255,255,.04);border-radius:50%;}

  .hdr h1{font-family:'Playfair Display',serif;font-size:clamp(20px,3.5vw,34px);font-weight:700;line-height:1.2;margin-bottom:6px;}
  .hs{font-size:13px;color:rgba(255,255,255,.72);margin-bottom:22px;}
  .tgs{display:flex;gap:10px;flex-wrap:wrap;}
  .tg{background:rgba(255,255,255,.14);border-radius:20px;padding:4px 14px;font-size:12px;font-weight:500;}
  .nb{background:var(--wh);border-bottom:2px solid var(--bd);position:sticky;top:0;z-index:200;box-shadow:0 2px 14px rgba(0,0,0,.07);}
  .ni{max-width:980px;margin:0 auto;padding:0 32px;display:flex;overflow-x:auto;scrollbar-width:none;}
  .ni::-webkit-scrollbar{display:none;}
  .nl{display:block;padding:13px 15px;font-size:12.5px;font-weight:600;color:var(--ts);text-decoration:none;white-space:nowrap;border-bottom:3px solid transparent;transition:all .2s;}
  .nl:hover{color:var(--pm);border-bottom-color:var(--pm);}

  .chl .dot{width:8px;height:8px;background:var(--pa);border-radius:50%;}

  .part-divider h2{font-size:18px;font-weight:800;margin-bottom:4px;}

  .art:hover{box-shadow:0 4px 22px rgba(10,61,107,.08);}
  .at{font-size:15.5px;font-weight:700;color:var(--p);display:flex;align-items:center;gap:10px;margin-bottom:18px;}

  .t tr:nth-child(even) td{background:var(--pp);}
  .t .hl{font-weight:700;color:var(--p);}
  .t .rd{font-weight:700;color:var(--red);}
  .bx{border-radius:10px;padding:16px 20px;margin:14px 0;display:flex;gap:14px;align-items:flex-start;}
  .bx.bl{background:var(--pp);border-left:4px solid var(--pl);}
  .bx.gd{background:var(--gl);border-left:4px solid var(--gold);}

  .bx.am{background:var(--al);border-left:4px solid var(--amb);}
  .bx.gr{background:var(--grl);border-left:4px solid var(--grn);}
  .bx .ic{font-size:20px;flex-shrink:0;margin-top:2px;}
  .bx .bd2{flex:1;font-size:14px;color:var(--tm);}
  .bx .bd2 strong{display:block;margin-bottom:4px;color:var(--td);}

  .step{display:flex;gap:16px;align-items:flex-start;padding:14px 0;border-bottom:1px dashed var(--bd);}

  .sn2{width:36px;height:36px;flex-shrink:0;background:var(--p);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;}
  .sb{flex:1;}
  .sb strong{display:block;font-size:14px;color:var(--td);margin-bottom:3px;}
  .sb p{font-size:13.5px;color:var(--tm);margin:0;}
  /* FLOW CARDS */
  .flow{display:flex;gap:0;align-items:stretch;flex-wrap:wrap;margin:20px 0;}
  .flow-item{flex:1;min-width:140px;background:var(--wh);border:1px solid var(--bd);border-radius:10px;padding:14px 12px;text-align:center;position:relative;}
  .flow-item::after{content:'→';position:absolute;right:-14px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--pm);font-weight:700;z-index:1;}
  .flow-item:last-child::after{display:none;}
  .flow-item .fi{font-size:22px;margin-bottom:6px;}
  .flow-item .ft2{font-size:12px;font-weight:700;color:var(--p);}
  .flow-item .fd{font-size:11.5px;color:var(--ts);margin-top:3px;}
  /* PHRASE BOX */
  .phrase{background:#1a1a2e;color:#a8e6cf;border-radius:10px;padding:18px 22px;margin:14px 0;font-style:italic;font-size:14px;line-height:1.8;border-left:4px solid var(--gold);}
  .phrase .ph-label{font-family:'Be Vietnam Pro',sans-serif;font-style:normal;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(168,230,207,.6);margin-bottom:8px;}
  .dv{height:1px;background:linear-gradient(to right,transparent,var(--bd),transparent);margin:16px 0;}
  p{color:var(--tm);margin-bottom:10px;}
  ul,ol{padding-left:20px;margin-bottom:10px;}
  li{margin-bottom:6px;color:var(--tm);}
  li::marker{color:var(--pm);}
  strong{color:var(--td);}
  .ft{background:linear-gradient(135deg,#051e3e 0%,#0a3d6b 100%);color:rgba(255,255,255,.7);text-align:center;padding:36px 32px;font-size:13px;line-height:1.9;}
  .ft strong{color:#fff;}
  .sr{margin-top:28px;display:flex;justify-content:center;gap:80px;flex-wrap:wrap;}
  .sg .st{font-size:11.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:42px;}
  .sg .sn{border-top:1px solid rgba(255,255,255,.3);padding-top:8px;font-size:13px;color:rgba(255,255,255,.8);}
  @media(max-width:640px){.wp{padding:24px 16px 60px;}.art{padding:20px 16px;}.flow{flex-direction:column;}.flow-item::after{content:'↓';right:50%;bottom:-14px;top:auto;transform:translateX(50%);}}
</style>
</head>

<div class="hdr">
  <div class="hi">

  <div id="c2" class="ch"><div class="chl"><span class="dot"></span>CHƯƠNG II</div><h2>Xử Lý Hàng Hết Hạn & Hàng Hỏng</h2></div>

  <div class="art">
    <div class="at"><span class="an">3</span>Quy trình xử lý hàng đã hết hạn</div>
    <div class="steps">
      <div class="step"><div class="sn2">1</div><div class="sb"><strong>Phát hiện & Thu hồi khỏi kệ</strong><p>Lấy hàng xuống ngay lập tức. Không để bất kỳ sản phẩm hết hạn nào trên kệ hoặc trong tầm tay khách hàng.</p></div></div>

      <div class="step"><div class="sn2">3</div><div class="sb"><strong>Để vào khu vực cách ly</strong><p>Khu vực cách ly phải được đánh dấu rõ ràng "KHÔNG BÁN — CHỜ XỬ LÝ". Tách hoàn toàn khỏi hàng hóa bình thường.</p></div></div>
      <div class="step"><div class="sn2">4</div><div class="sb"><strong>Quản lý ca xác nhận & phê duyệt tiêu hủy</strong><p>Quản lý ca kiểm tra lại, ký xác nhận vào sổ. Trường hợp giá trị lớn (> 500.000đ) → báo cáo thêm lên Quản lý cửa hàng.</p></div></div>
      <div class="step"><div class="sn2">5</div><div class="sb"><strong>Tiêu hủy có chứng kiến</strong><p>Tiêu hủy thực phẩm: đổ vào thùng rác có niêm phong. Phải có ít nhất 2 người chứng kiến. <strong>Tuyệt đối không cho, bán hoặc mang về</strong> hàng hết hạn dù bất kỳ lý do gì.</p></div></div>
      <div class="step"><div class="sn2">6</div><div class="sb"><strong>Ghi nhận vào hệ thống</strong><p>Xuất kho hàng hết hạn/hủy trong hệ thống quản lý kho. Số liệu này là đầu vào để tính thưởng HQKD tháng.</p></div></div>
    </div>
    <div class="bx rd"><div class="ic">🚫</div><div class="bd2"><strong>Tuyệt đối cấm</strong><p>Đổi nhãn HSD, bán hàng hết hạn với bất kỳ lý do gì (kể cả giảm giá 0đ), mang hàng hết hạn ra khỏi cửa hàng cho mục đích cá nhân. Vi phạm → sa thải ngay lập tức và truy cứu trách nhiệm pháp lý.</p></div></div>
  </div>

      <tr><th>Bước</th><th>Nội dung</th><th>Thời gian</th></tr>

      <tr><td class="hl">2</td><td>Gửi thông báo trả hàng cho NCC qua Zalo/email kèm ảnh và danh sách</td><td>Trong vòng 24 giờ</td></tr>

    <p>Mỗi khiếu nại là cơ hội để giữ chân khách hàng — xử lý đúng cách, khách hàng sẽ trung thành hơn</p>

<div class="wp">

  <div id="c1" class="ch"><div class="chl"><span class="dot"></span>CHƯƠNG I</div><h2>14 Nguyên Tắc Trưng Bày Cốt Lõi</h2></div>

  <div class="art">
    <div class="at"><span class="an">1</span>Bộ nguyên tắc merchandising VicoMart</div>
    <div class="prin-grid">
      <div class="prin-card"><div class="prin-num">1</div><div class="prin-body"><strong>Kệ đầy — không để khoảng trống</strong><p>Kệ trống là doanh thu bị mất. Ưu tiên bổ sung hàng ngay khi phát hiện khoảng trống trên kệ.</p></div></div>
      <div class="prin-card"><div class="prin-num">2</div><div class="prin-body"><strong>FIFO trên kệ</strong><p>Hàng cũ ra trước, hàng mới vào sau. Đẩy hàng cũ về phía trước mỗi khi bổ sung hàng mới.</p></div></div>
      <div class="prin-card"><div class="prin-num">3</div><div class="prin-body"><strong>Nhãn giá luôn rõ ràng & đúng</strong><p>Mỗi sản phẩm phải có nhãn giá đúng, dễ đọc, đúng vị trí ngay bên dưới sản phẩm.</p></div></div>
      <div class="prin-card"><div class="prin-num">4</div><div class="prin-body"><strong>Hàng bán chạy ở tầm mắt</strong><p>Tầm mắt (1m–1.6m từ sàn) là vị trí vàng. Đặt hàng có biên lợi nhuận cao và hàng bán chạy ở đây.</p></div></div>
      <div class="prin-card"><div class="prin-num">5</div><div class="prin-body"><strong>Nhóm hàng theo logic mua sắm</strong><p>Đặt hàng gần nhau theo thói quen mua: mì gói gần nước tương; bánh gần sữa tươi.</p></div></div>
      <div class="prin-card"><div class="prin-num">6</div><div class="prin-body"><strong>Hàng nặng xuống thấp, nhẹ lên cao</strong><p>An toàn cho khách và nhân viên. Hàng cồng kềnh, nặng xếp tầng dưới cùng của kệ.</p></div></div>
      <div class="prin-card"><div class="prin-num">7</div><div class="prin-body"><strong>Mặt hàng hướng ra phía khách</strong><p>Nhãn hiệu và tên sản phẩm luôn hướng về phía khách. Không để sản phẩm quay ngược nhãn vào trong.</p></div></div>
      <div class="prin-card"><div class="prin-num">8</div><div class="prin-body"><strong>Khoảng cách lối đi tối thiểu 90cm</strong><p>Lối đi phải đủ rộng cho 2 người hoặc 1 xe đẩy đi qua thoải mái. Không để hàng lấn lối đi.</p></div></div>
      <div class="prin-card"><div class="prin-num">9</div><div class="prin-body"><strong>Hàng khuyến mãi có vị trí nổi bật</strong><p>KM đầu kệ, đầu dãy (end-cap) hoặc khu vực đặc biệt — có biển giá KM rõ ràng, màu nổi bật.</p></div></div>
      <div class="prin-card"><div class="prin-num">10</div><div class="prin-body"><strong>Không trưng bày hàng lỗi, hết hạn</strong><p>Kiểm tra HSD mỗi ca. Hàng hết hạn hoặc lỗi bao bì phải được thu hồi ngay lập tức.</p></div></div>
      <div class="prin-card"><div class="prin-num">11</div><div class="prin-body"><strong>Kệ sạch — không bụi, không dầu mỡ</strong><p>Lau kệ định kỳ. Đặc biệt khu vực dầu ăn, nước mắm, thực phẩm có dầu — lau ngay khi phát hiện.</p></div></div>
      <div class="prin-card"><div class="prin-num">12</div><div class="prin-body"><strong>Nhất quán toàn hệ thống</strong><p>Cùng nhóm hàng phải được trưng bày theo cùng 1 chuẩn tại tất cả cửa hàng VicoMart.</p></div></div>
      <div class="prin-card"><div class="prin-num">13</div><div class="prin-body"><strong>Tận dụng điểm hot zone để kích bán</strong><p>Đặt hàng theo mùa, hàng mới ra, hàng biên lợi nhuận cao tại khu vực hot zone.</p></div></div>
      <div class="prin-card"><div class="prin-num">14</div><div class="prin-body"><strong>Cập nhật khi hàng thay đổi</strong><p>Khi NCC thay đổi mẫu mã, kích thước — cập nhật vị trí kệ và nhãn giá ngay trong ngày nhận hàng mới.</p></div></div>
    </div>
  </div>

  <div id="c2" class="ch"><div class="chl"><span class="dot"></span>CHƯƠNG II</div><h2>Phân Vùng & Bố Cục Cửa Hàng</h2></div>

  <div class="art">
    <div class="at"><span class="an">2</span>Phân vùng nhiệt theo lưu lượng khách</div>
    <div class="zone-grid">
      <div class="zone-card hot">
        <div class="zi">🔥</div>
        <h4>Hot Zone</h4>
        <p>Khu vực cửa vào, đầu dãy kệ, gần quầy thu ngân. Lưu lượng cao nhất. Đặt hàng KM, hàng mới, hàng theo mùa, hàng tỷ suất lợi nhuận cao.</p>
      </div>
      <div class="zone-card warm">
        <div class="zi">🌡️</div>
        <h4>Warm Zone</h4>
        <p>Giữa các dãy kệ chính. Lưu lượng trung bình. Đặt hàng thiết yếu hàng ngày: gạo, mì, dầu ăn, nước tương, đồ hộp.</p>
      </div>
      <div class="zone-card cold">
        <div class="zi">❄️</div>
        <h4>Cold Zone</h4>
        <p>Góc sâu, cuối dãy kệ. Lưu lượng thấp. Đặt hàng cần thiết nhưng ít mua thường xuyên: hàng gia dụng, hóa phẩm, vật dụng cá nhân.</p>
      </div>
    </div>
    <div class="bx gd"><div class="ic">💡</div><div class="bd2"><strong>Chiến thuật dẫn dắt khách hàng</strong><p>Đặt hàng thiết yếu cao nhất (gạo, dầu ăn, nước chấm) ở <strong>Warm/Cold Zone</strong> buộc khách phải đi qua toàn bộ cửa hàng → tiếp xúc nhiều sản phẩm hơn → tăng tỷ lệ mua thêm (basket size).</p></div></div>
  </div>

  <div id="c3" class="ch"><div class="chl"><span class="dot"></span>CHƯƠNG III</div><h2>Tiêu Chuẩn Kệ Hàng</h2></div>

  <div class="art">
    <div class="at"><span class="an">3</span>Tiêu chuẩn từng tầng kệ</div>
    <table class="t">
      <tr><th>Tầng kệ</th><th>Chiều cao từ sàn</th><th>Loại hàng phù hợp</th><th>Lý do</th></tr>
      <tr><td class="hl">Tầng trên cùng</td><td>Trên 1.6m</td><td>Hàng nhẹ, hàng trang trí, biển hiệu chương trình KM</td><td>Khó lấy, không dành cho hàng thông thường</td></tr>
      <tr><td class="hl">Tầm mắt (Tầng vàng)</td><td>1.0m – 1.6m</td><td>Hàng bán chạy, hàng biên lợi nhuận cao, hàng KM</td><td>Vị trí khách nhìn đầu tiên — tỷ lệ mua cao nhất</td></tr>
      <tr><td class="hl">Tầm tay (Tầng bạc)</td><td>0.5m – 1.0m</td><td>Hàng phổ thông, hàng dành cho trẻ em</td><td>Tiện lấy, phù hợp hàng ngày</td></tr>
      <tr><td class="hl">Tầng thấp nhất</td><td>0 – 0.5m</td><td>Hàng nặng, cồng kềnh, hàng mua theo thùng/lốc</td><td>An toàn, tiện cho hàng nặng</td></tr>
    </table>
  </div>

  <div class="art">
    <div class="at"><span class="an">4</span>Tiêu chuẩn bổ sung hàng lên kệ</div>
    <div class="dolist">
      <div class="do-card do">
        <h4>✓ Đúng chuẩn</h4>
        <ul>
          <li>Đẩy hàng cũ ra phía trước trước khi xếp hàng mới vào sau (FIFO).</li>
          <li>Mặt hàng hướng về phía khách, nhãn dễ đọc.</li>
          <li>Xếp hàng ngay thẳng, đều nhau, không xộc xệch.</li>
          <li>Bổ sung hàng khi tầng kệ còn < 30% số lượng tiêu chuẩn.</li>
          <li>Kiểm tra HSD trước khi xếp lên kệ.</li>
          <li>Cập nhật nhãn giá nếu giá thay đổi.</li>
        </ul>
      </div>
      <div class="do-card dont">
        <h4>✗ Không được phép</h4>
        <ul>
          <li>Xếp hàng mới ra phía trước, đẩy hàng cũ vào trong (vi phạm FIFO).</li>
          <li>Để kệ trống quá 30 phút mà không bổ sung hoặc thông báo.</li>
          <li>Xếp hàng sai vị trí planogram mà không báo quản lý.</li>
          <li>Để bao bì rách, hộp móp trên kệ bán hàng.</li>
          <li>Để giá cũ khi giá đã thay đổi (dù chỉ 1 sản phẩm).</li>
        </ul>
      </div>
    </div>
  </div>

  <div id="c4" class="ch"><div class="chl"><span class="dot"></span>CHƯƠNG IV</div><h2>Tiêu Chuẩn Nhãn Giá & Biển Hiệu</h2></div>

  <div class="art">
    <div class="at"><span class="an">5</span>Quy định nhãn giá</div>
    <table class="t">
      <tr><th>Tiêu chí</th><th>Quy định</th></tr>
      <tr><td>Vị trí nhãn giá</td><td>Ngay bên dưới sản phẩm, căn trái theo mép kệ. Không để nhãn giá của sản phẩm này nằm dưới sản phẩm khác.</td></tr>
      <tr><td>Nội dung bắt buộc</td><td>Tên sản phẩm, đơn vị tính, giá bán lẻ (đã VAT), mã SKU.</td></tr>
      <tr><td>Nhãn giá khuyến mãi</td><td>Ghi rõ giá gốc (gạch ngang) và giá KM; thời hạn KM; % hoặc số tiền giảm. Màu đỏ/cam nổi bật.</td></tr>
      <tr><td>Cỡ chữ tối thiểu</td><td>Giá bán: ≥ 18pt. Tên sản phẩm: ≥ 12pt. Đảm bảo đọc được từ khoảng cách 50cm.</td></tr>
      <tr><td>Cập nhật khi thay đổi giá</td><td>Thay nhãn giá trong vòng <strong>2 giờ</strong> kể từ khi có thông báo thay đổi giá từ hệ thống.</td></tr>
    </table>
    <div class="bx rd"><div class="ic">⚠️</div><div class="bd2"><strong>Sai nhãn giá là vi phạm nghiêm trọng</strong><p>Nhãn giá sai (cao hơn thực tế) gây mất niềm tin khách hàng và vi phạm pháp lý (Luật Bảo vệ quyền lợi người tiêu dùng). Phát hiện nhãn sai → xử lý ngay lập tức, không chờ ca sau.</p></div></div>
  </div>

  <div id="c5" class="ch"><div class="chl"><span class="dot"></span>CHƯƠNG V</div><h2>Khu Vực Trưng Bày Đặc Biệt</h2></div>

  <div class="art">
    <div class="at"><span class="an">6</span>Tiêu chuẩn các khu vực đặc biệt</div>
    <table class="t">
      <tr><th>Khu vực</th><th>Tiêu chuẩn trưng bày</th><th>Cập nhật</th></tr>
      <tr><td><strong>Đầu dãy kệ (End-cap)</strong></td><td>Chỉ trưng bày hàng KM, hàng mới ra, hoặc hàng theo mùa. Tối đa 2–3 SKU/end-cap. Phải có biển giá lớn, rõ ràng.</td><td>Theo chu kỳ KM (tuần/tháng)</td></tr>
      <tr><td><strong>Khu vực thanh toán</strong></td><td>Trưng bày hàng nhỏ, giá thấp, mua bốc đồng (kẹo, pin, khẩu trang...). Không để hàng cồng kềnh chắn tầm nhìn nhân viên thu ngân.</td><td>Kiểm tra mỗi ca</td></tr>
      <tr><td><strong>Cửa vào (Welcome zone)</strong></td><td>Hàng theo mùa, hàng mới nhập, hoa quả tươi đẹp, hàng KM lớn. Phải thay đổi ít nhất <strong>2 tuần/lần</strong>.</td><td>Định kỳ 2 tuần</td></tr>
      <tr><td><strong>Tủ lạnh / tủ đông</strong></td><td>Hàng sắp xếp theo nhóm rõ ràng, có nhãn phân loại. Cửa tủ sạch, không có hơi nước đọng dày. Không để hàng quá đầy làm tắc luồng khí lạnh.</td><td>Kiểm tra mỗi ca</td></tr>
    </table>
  </div>

  <div id="c6" class="ch"><div class="chl"><span class="dot"></span>CHƯƠNG VI</div><h2>Kiểm Tra, Duy Trì & Hiệu Lực</h2></div>

<div class="hdr">

<div class="wp">

  <div id="c1" class="ch"><div class="chl"><span class="dot"></span>CHƯƠNG I</div><h2>Nguyên Tắc Quản Lý Tiền Mặt</h2></div>

  <div class="art">
    <div class="at"><span class="an">1</span>Các nguyên tắc bất di bất dịch</div>
    <div class="bx rd"><div class="ic">🚫</div><div class="bd2">
      <strong>6 điều tuyệt đối cấm — vi phạm bất kỳ điều nào → sa thải ngay lập tức</strong>
      <ol style="padding-left:18px;margin-top:6px;">
        <li>Mượn tiền từ quỹ thu ngân hoặc két an toàn dù bất kỳ lý do gì.</li>
        <li>Để tiền cá nhân lẫn vào ngăn kéo thu ngân.</li>
        <li>Thao tác trên máy POS bằng tài khoản của người khác.</li>
        <li>Chiết khấu, hoàn tiền trái phép không có phê duyệt.</li>
        <li>Không quét hàng khi tính tiền (bỏ qua sản phẩm).</li>
        <li>Tự ý nộp tiền hoặc lấy tiền từ két không theo quy trình.</li>
      </ol>
    </div></div>

    <div class="bx gd"><div class="ic">⚖️</div><div class="bd2">
      <strong>Nguyên tắc 2 người trong mọi giao dịch tiền mặt lớn</strong>
      <p>Mọi giao dịch tiền mặt trên <strong>2.000.000đ</strong> (nộp két, lấy tiền từ két, đếm tiền kết ca) đều phải có ít nhất 2 người: 1 thực hiện, 1 chứng kiến và ký xác nhận.</p>
    </div></div>
  </div>

  <div id="c2" class="ch"><div class="chl"><span class="dot"></span>CHƯƠNG II</div><h2>Quỹ Tiền Mặt Tại Cửa Hàng</h2></div>

  <div class="art">
    <div class="at"><span class="an">2</span>Mức quỹ tiền mặt quy định</div>
    <div class="limit-grid">
      <div class="limit-card green">
        <div class="lc-icon">🟢</div>
        <div class="lc-label">Quỹ đầu ca (mỗi máy)</div>
        <div class="lc-amount">500.000đ</div>
        <div class="lc-note">Tiền lẻ để trả tiền thối cho khách</div>
      </div>
      <div class="limit-card amber">
        <div class="lc-icon">🟡</div>
        <div class="lc-label">Tối đa tại quầy thu ngân</div>
        <div class="lc-amount">3.000.000đ</div>
        <div class="lc-note">Vượt mức → nộp bớt vào két ngay</div>
      </div>
      <div class="limit-card red">
        <div class="lc-icon">🔴</div>
        <div class="lc-label">Tối đa trong két cuối ngày</div>
        <div class="lc-amount">20.000.000đ</div>
        <div class="lc-note">Vượt mức → nộp ngân hàng trong ngày hôm sau</div>
      </div>
    </div>
    <p style="font-size:12.5px;color:var(--ts);">* Mức cụ thể có thể điều chỉnh theo quy mô doanh thu từng cửa hàng, do Ban Giám đốc phê duyệt.</p>
  </div>

  <div id="c3" class="ch"><div class="chl"><span class="dot"></span>CHƯƠNG III</div><h2>Quy Trình Thu Ngân & Xử Lý Thanh Toán</h2></div>

  <div class="art">
    <div class="at"><span class="an">3</span>Quy trình tính tiền chuẩn</div>
    <div class="steps">
      <div class="step"><div class="sn2">1</div><div class="sb"><strong>Chào khách & Sẵn sàng</strong><p>Đăng nhập POS bằng tài khoản cá nhân. Chào khách: "Dạ, anh/chị cho em tính tiền ạ!"</p></div></div>
      <div class="step"><div class="sn2">2</div><div class="sb"><strong>Quét toàn bộ hàng hóa</strong><p>Quét từng sản phẩm, kiểm tra giá hiển thị trên màn hình. Sản phẩm không có mã vạch → nhập thủ công mã SKU, không tự đặt giá.</p></div></div>
      <div class="step"><div class="sn2">3</div><div class="sb"><strong>Thông báo tổng tiền</strong><p>"Dạ tổng cộng [số tiền] ạ. Anh/chị thanh toán tiền mặt hay thẻ ạ?"</p></div></div>
      <div class="step"><div class="sn2">4</div><div class="sb"><strong>Nhận tiền & Đếm lại trước mặt khách</strong><p>Tiền mặt: đếm lại trước mặt khách, thông báo số tiền nhận: "Em nhận [X] đồng." Để tiền trên quầy, chưa cất vào ngăn kéo cho đến khi trả tiền thối xong.</p></div></div>
      <div class="step"><div class="sn2">5</div><div class="sb"><strong>Trả tiền thối & In hóa đơn</strong><p>Đếm tiền thối trước mặt khách. Đưa hóa đơn và tiền thối cùng lúc. "Dạ tiền thối [X] đồng và hóa đơn của anh/chị ạ. Cảm ơn anh/chị!"</p></div></div>
      <div class="step"><div class="sn2">6</div><div class="sb"><strong>Cất tiền vào ngăn kéo</strong><p>Chỉ cất tiền vào ngăn kéo SAU KHI đã trả tiền thối và hóa đơn cho khách xong. Phân loại tiền theo mệnh giá.</p></div></div>
    </div>

    <div class="dv"></div>
    <p><strong>Thanh toán thẻ / QR / chuyển khoản:</strong></p>
    <table class="t">
      <tr><th>Hình thức</th><th>Quy trình xử lý</th><th>Lưu ý</th></tr>
      <tr><td>Thẻ ngân hàng (POS)</td><td>Chờ máy POS xác nhận thành công, in bill POS, đưa cùng hóa đơn bán hàng</td><td>Không thực hiện giao dịch nếu máy POS chưa hiện "Giao dịch thành công"</td></tr>
      <tr><td>QR Code / VietQR</td><td>Chờ thông báo chuyển khoản thành công trên ứng dụng/màn hình, xác nhận trước khi để khách rời quầy</td><td>Không chấp nhận ảnh chụp màn hình chuyển khoản — phải có thông báo thực</td></tr>
      <tr><td>Ví điện tử (Momo, ZaloPay...)</td><td>Xác nhận trên ứng dụng của cửa hàng, không dựa vào màn hình của khách</td><td>Kiểm tra đúng số tài khoản và số tiền trước khi xác nhận</td></tr>
    </table>
  </div>

  <div id="c4" class="ch"><div class="chl"><span class="dot"></span>CHƯƠNG IV</div><h2>Đối Soát & Kết Ca</h2></div>

  <div class="art">
    <div class="at"><span class="an">4</span>Quy trình kết ca thu ngân</div>
    <div class="steps">
      <div class="step"><div class="sn2">1</div><div class="sb"><strong>In báo cáo doanh thu từ POS</strong><p>In báo cáo Z (cuối ca): tổng doanh thu, số giao dịch, phân theo hình thức thanh toán (tiền mặt, thẻ, QR).</p></div></div>
      <div class="step"><div class="sn2">2</div><div class="sb"><strong>Đếm tiền mặt thực tế</strong><p>Đếm toàn bộ tiền trong ngăn kéo. Phân loại theo mệnh giá. Có quản lý ca chứng kiến.</p></div></div>
      <div class="step"><div class="sn2">3</div><div class="sb"><strong>Đối chiếu số liệu</strong><p>So sánh: Tiền mặt thực tế = Tiền mặt POS báo cáo. Ghi chênh lệch vào biên bản kết ca (thừa/thiếu bao nhiêu, lý do nếu biết).</p></div></div>
      <div class="step"><div class="sn2">4</div><div class="sb"><strong>Tách quỹ đầu ca cho ca tiếp theo</strong><p>Giữ lại đúng 500.000đ (tiền lẻ, đa mệnh giá) cho quỹ đầu ca tiếp theo.</p></div></div>
      <div class="step"><div class="sn2">5</div><div class="sb"><strong>Niêm phong & Nộp két</strong><p>Phần tiền còn lại bỏ vào túi niêm phong chuyên dụng, ghi rõ: ngày, ca, số tiền, tên nhân viên thu ngân. Nộp vào két có quản lý ca chứng kiến.</p></div></div>
      <div class="step"><div class="sn2">6</div><div class="sb"><strong>Ký biên bản kết ca</strong><p>Cả nhân viên thu ngân và quản lý ca ký vào biên bản kết ca. Lưu biên bản tại cửa hàng tối thiểu 30 ngày.</p></div></div>
    </div>
  </div>

  <div id="c5" class="ch"><div class="chl"><span class="dot"></span>CHƯƠNG V</div><h2>Két An Toàn</h2></div>

  <div class="art">

  <div id="c1" class="ch"><div class="chl"><span class="dot"></span>CHƯƠNG I</div><h2>Quy Định Chung</h2></div>

  <div class="art">

      <li>Nghị định số 145/2020/NĐ-CP ngày 14/12/2020 hướng dẫn thi hành Bộ luật Lao động;</li>
      <li>Nghị định số 12/2022/NĐ-CP quy định xử phạt vi phạm hành chính trong lĩnh vực lao động;</li>
      <li>Điều lệ tổ chức và hoạt động của Công ty Cổ phần Bán lẻ VicoMart Retail.</li>

  <div class="art">
    <div class="at"><span class="an">2</span>Phạm vi và đối tượng áp dụng</div>
    <p>Nội quy này áp dụng cho toàn bộ người lao động (NLĐ) làm việc tại <strong>Công ty Cổ phần Bán lẻ VicoMart Retail</strong>, bao gồm tất cả chi nhánh, cửa hàng, kho hàng và văn phòng trên toàn quốc, không phân biệt hình thức hợp đồng lao động.</p>
    <div class="bx gd"><div class="ic">📢</div><div class="bd2"><strong>Nghĩa vụ phổ biến nội quy</strong><p>Người sử dụng lao động có trách nhiệm phổ biến nội quy đến toàn thể người lao động. Mỗi NLĐ ký xác nhận đã được phổ biến và cam kết chấp hành. Không biết nội quy không phải lý do để miễn trách nhiệm.</p></div></div>
  </div>

  <div id="c2" class="ch"><div class="chl"><span class="dot"></span>CHƯƠNG II</div><h2>Tuyển Dụng & Hợp Đồng Lao Động</h2></div>

  <div class="art">
    <div class="at"><span class="an">3</span>Giao kết hợp đồng lao động</div>
    <div class="dieu">
      <div class="dieu-title">Điều 3.1 — Hình thức hợp đồng</div>
      <p>Mọi quan hệ lao động tại VicoMart đều được xác lập bằng <strong>Hợp đồng lao động (HĐLĐ) bằng văn bản</strong>, ký trước hoặc ngay khi NLĐ bắt đầu làm việc. Không có hợp đồng miệng.</p>
      <ul>
        <li><strong>HĐLĐ xác định thời hạn:</strong> Tối đa 36 tháng.</li>
        <li><strong>HĐLĐ không xác định thời hạn:</strong> Áp dụng sau khi hết 2 lần ký HĐLĐ có thời hạn.</li>
        <li><strong>Hợp đồng thử việc:</strong> Không vượt quá 30 ngày (NV) hoặc 60 ngày (Quản lý).</li>
      </ul>
    </div>
    <div class="dieu">
      <div class="dieu-title">Điều 3.2 — Nội dung bắt buộc trong HĐLĐ</div>
      <p>Theo Điều 21 BLLĐ 2019, HĐLĐ phải có đầy đủ: tên và địa chỉ các bên, công việc và địa điểm làm việc, thời hạn, mức lương, hình thức trả lương, thời giờ làm việc, nghỉ ngơi, trang bị bảo hộ lao động, BHXH–BHYT–BHTN.</p>
    </div>
  </div>

  <div class="art">
    <div class="at"><span class="an">4</span>Chấm dứt hợp đồng lao động</div>
    <table class="t">
      <tr><th>Trường hợp</th><th>Thời gian báo trước</th><th>Căn cứ pháp lý</th></tr>
      <tr><td>NLĐ đơn phương chấm dứt HĐLĐ có thời hạn</td><td class="hl">Ít nhất 30 ngày</td><td>Điều 35 BLLĐ 2019</td></tr>
      <tr><td>NLĐ đơn phương chấm dứt HĐLĐ không thời hạn</td><td class="hl">Ít nhất 45 ngày</td><td>Điều 35 BLLĐ 2019</td></tr>
      <tr><td>NSDLĐ đơn phương chấm dứt HĐLĐ</td><td class="hl">Ít nhất 30–45 ngày (tùy loại HĐ)</td><td>Điều 36 BLLĐ 2019</td></tr>
      <tr><td>Sa thải do vi phạm kỷ luật</td><td class="hl">Không cần báo trước (có biên bản)</td><td>Điều 125 BLLĐ 2019</td></tr>
    </table>
    <div class="bx rd"><div class="ic">⚠️</div><div class="bd2"><strong>Trợ cấp thôi việc</strong><p>NLĐ làm việc đủ 12 tháng trở lên được hưởng trợ cấp thôi việc = 1/2 tháng lương × số năm làm việc (theo Điều 46 BLLĐ 2019), trừ thời gian đã tham gia BHTN.</p></div></div>
  </div>

  <div id="c3" class="ch"><div class="chl"><span class="dot"></span>CHƯƠNG III</div><h2>Thời Giờ Làm Việc & Nghỉ Ngơi</h2></div>

  <div class="art">
    <div class="at"><span class="an">5</span>Thời giờ làm việc tiêu chuẩn</div>
    <div class="dieu">
      <div class="dieu-title">Điều 5.1 — Giờ làm việc</div>
      <ul>
        <li>Thời giờ làm việc tiêu chuẩn: <strong>không quá 8 giờ/ngày và 48 giờ/tuần</strong> (Điều 105 BLLĐ 2019).</li>
        <li>Ca 1: 06:30 – 14:30 (nghỉ giữa ca 30 phút — 10:30–11:00).</li>
        <li>Ca 2: 14:00 – 22:00 (nghỉ giữa ca 30 phút — 18:00–18:30).</li>
        <li>Thời gian nghỉ giữa ca được tính vào giờ làm việc.</li>
      </ul>
    </div>
    <div class="dieu">
      <div class="dieu-title">Điều 5.2 — Làm thêm giờ</div>
      <ul>
        <li>Làm thêm giờ chỉ được thực hiện khi có sự đồng ý của NLĐ và phê duyệt của quản lý.</li>
        <li>Không vượt quá <strong>40 giờ/tháng và 200 giờ/năm</strong> (trường hợp đặc biệt tối đa 300 giờ/năm theo Điều 107 BLLĐ 2019).</li>
        <li>Tiền lương làm thêm giờ ngày thường ≥ 150%; ngày nghỉ hàng tuần ≥ 200%; ngày nghỉ lễ ≥ 300% lương ngày thường.</li>
      </ul>
    </div>
  </div>

  <div id="c4" class="ch"><div class="chl"><span class="dot"></span>CHƯƠNG IV</div><h2>Tiền Lương & Phúc Lợi</h2></div>

  <div class="art">
    <div class="at"><span class="an">6</span>Nguyên tắc trả lương</div>
    <div class="dieu">
      <div class="dieu-title">Điều 6.1 — Hình thức và kỳ trả lương</div>
      <ul>
        <li>Lương trả bằng tiền Việt Nam đồng, qua chuyển khoản ngân hàng.</li>
        <li>Kỳ trả lương: tạm ứng ngày 25 (tính đến ngày 15); thanh toán chính thức ngày 10 tháng sau.</li>
        <li>Lương không thấp hơn mức lương tối thiểu vùng do Chính phủ quy định.</li>
      </ul>
    </div>
    <div class="dieu">
      <div class="dieu-title">Điều 6.2 — Các khoản khấu trừ lương hợp pháp</div>
      <ul>
        <li>Khấu trừ BHXH, BHYT, BHTN theo tỷ lệ NLĐ đóng góp theo quy định hiện hành.</li>
        <li>Khấu trừ thuế thu nhập cá nhân (nếu có) theo Luật Thuế TNCN.</li>
        <li>Khấu trừ bồi thường thiệt hại tài sản (nếu có) — không quá 30% lương tháng.</li>
        <li>Tổng các khoản khấu trừ không vượt quá 30% lương tháng (Điều 102 BLLĐ 2019).</li>
      </ul>
    </div>
  </div>

  <div id="c5" class="ch"><div class="chl"><span class="dot"></span>CHƯƠNG V</div><h2>An Toàn Vệ Sinh Lao Động</h2></div>

  <div class="art">
    <div class="at"><span class="an">7</span>Quyền và nghĩa vụ về ATVSLĐ</div>
    <div class="dieu">
      <div class="dieu-title">Điều 7.1 — Nghĩa vụ của người sử dụng lao động</div>
      <ul>
        <li>Trang bị đầy đủ phương tiện bảo hộ lao động (BHLĐ) cho NLĐ khi thực hiện công việc có yếu tố nguy hiểm.</li>
        <li>Tổ chức khám sức khỏe định kỳ ít nhất 1 lần/năm cho NLĐ.</li>
        <li>Thực hiện khai báo, điều tra, thống kê và báo cáo tai nạn lao động theo quy định.</li>
        <li>Bảo đảm nơi làm việc đạt tiêu chuẩn về không gian, độ thoáng, ánh sáng, vệ sinh môi trường.</li>
      </ul>
    </div>
    <div class="dieu">
      <div class="dieu-title">Điều 7.2 — Nghĩa vụ của người lao động</div>
      <ul>
        <li>Chấp hành nội quy, quy trình an toàn lao động và sử dụng đúng phương tiện BHLĐ được trang cấp.</li>

    <div class="dieu" style="margin-top:16px;">

  <div id="c7" class="ch"><div class="chl"><span class="dot"></span>CHƯƠNG VII</div><h2>Kỷ Luật Lao Động & Trách Nhiệm Vật Chất</h2></div>

  d13a: {html:`<!DOCTYPE html>
<html lang="vi">
<head>

<style>
  :root{--p:#0a3d6b;--pm:#1565c0;--pl:#1e88e5;--pp:#e8f1fb;--pa:#2979ff;--gold:#c9a84c;--gl:#fdf3d8;--red:#c0392b;--rl:#fdecea;--amb:#d35400;--al:#fef0e6;--grn:#1a7a3c;--grl:#e8f7ef;--fire:#b71c1c;--fire-lt:#ffebee;--td:#1a1a1a;--tm:#3d3d3d;--ts:#6b7280;--bg:#f5f8fd;--wh:#fff;--bd:#c5d8f0;--r:12px;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Be Vietnam Pro',sans-serif;background:var(--bg);color:var(--td);line-height:1.75;font-size:15px;}
  .hdr{background:linear-gradient(140deg,#051e3e 0%,#0a3d6b 45%,#1565c0 100%);color:#fff;position:relative;overflow:hidden;}
  .hdr::before{content:'';position:absolute;top:-100px;right:-100px;width:400px;height:400px;background:rgba(255,255,255,.04);border-radius:50%;}

  .nl{display:block;padding:13px 15px;font-size:12.5px;font-weight:600;color:var(--ts);text-decoration:none;white-space:nowrap;border-bottom:3px solid transparent;transition:all .2s;}
  .nl:hover{color:var(--pm);border-bottom-color:var(--pm);}

  /* EMERGENCY STEPS */
  .esteps{margin:16px 0;}
  .estep{display:flex;gap:14px;align-items:flex-start;padding:12px 0;border-bottom:1px dashed #ffcdd2;}

  .esb strong{display:block;font-size:14px;color:var(--fire);margin-bottom:3px;}
  .esb p{font-size:13.5px;color:var(--tm);margin:0;}
  /* NORMAL STEPS */
  .steps{margin:16px 0;}
  .step{display:flex;gap:14px;align-items:flex-start;padding:12px 0;border-bottom:1px dashed var(--bd);}
  .step:last-child{border-bottom:none;}
  .sn2{width:36px;height:36px;flex-shrink:0;background:var(--p);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;}
  .sb{flex:1;}
  .sb strong{display:block;font-size:14px;color:var(--td);margin-bottom:3px;}
  .sb p{font-size:13.5px;color:var(--tm);margin:0;}
  /* FIRE EXTINGUISHER */
  .ext-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin:16px 0;}
  .ext-card{border-radius:10px;padding:16px;border:2px solid;text-align:center;}
  .ext-card.co2{background:#e3f2fd;border-color:#1565c0;}
  .ext-card.bot{background:#e8f5e9;border-color:#2e7d32;}

  .day-card{border-radius:8px;padding:10px 6px;text-align:center;border:1px solid var(--bd);}

  .sn2{width:34px;height:34px;flex-shrink:0;background:var(--p);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;}

  .ft{background:linear-gradient(135deg,#051e3e 0%,#0a3d6b 100%);color:rgba(255,255,255,.7);text-align:center;padding:36px 32px;font-size:13px;line-height:1.9;}

  .sr{margin-top:28px;display:flex;justify-content:center;gap:80px;flex-wrap:wrap;}
