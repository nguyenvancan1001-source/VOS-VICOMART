<div class="wp">

  <div id="c1" class="ch"><div class="chl"><span class="dot"></span>CHƯƠNG I</div><h2>Nguyên Tắc Quản Lý Tồn Kho</h2></div>
  <div class="art">
    <div class="at"><span class="an">1</span>5 nguyên tắc cốt lõi</div>
    <div class="bx gr"><div class="ic">①</div><div class="bd2"><strong>Không để hết hàng (Stockout = Doanh thu bị mất)</strong><p>Hàng trống kệ là mất doanh thu trực tiếp và mất khách hàng dài hạn. Duy trì tồn kho tối thiểu là trách nhiệm bắt buộc của quản lý cửa hàng.</p></div></div>
    <div class="bx bl"><div class="ic">②</div><div class="bd2"><strong>Không tồn kho quá mức (Overstock = Chi phí ẩn)</strong><p>Hàng tồn quá nhiều chiếm vốn lưu động, tăng nguy cơ hết hạn và lãng phí không gian kho. Đặt hàng đúng lượng, đúng thời điểm.</p></div></div>
    <div class="bx gd"><div class="ic">③</div><div class="bd2"><strong>FIFO — Nhập trước xuất trước</strong><p>Hàng nhập trước phải được bán trước. Áp dụng tuyệt đối không ngoại lệ để kiểm soát hạn sử dụng.</p></div></div>
    <div class="bx am"><div class="ic">④</div><div class="bd2"><strong>Dữ liệu thực tế quyết định đặt hàng</strong><p>Đặt hàng dựa trên dữ liệu bán hàng thực tế từ hệ thống POS, không dựa trên cảm tính hay thói quen. Phân tích xu hướng tuần/tháng trước khi đặt.</p></div></div>
    <div class="bx gr"><div class="ic">⑤</div><div class="bd2"><strong>Tồn kho là trách nhiệm chung</strong><p>Nhân viên phát hiện kệ trống hoặc hàng tồn thấp có trách nhiệm báo cáo ngay — không chờ quản lý nhắc.</p></div></div>
  </div>

  <div id="c2" class="ch"><div class="chl"><span class="dot"></span>CHƯƠNG II</div><h2>Mức Tồn Kho Tối Thiểu & Tối Đa (Min/Max)</h2></div>
  <div class="art">
    <div class="at"><span class="an">2</span>Hệ thống ngưỡng tồn kho</div>
    <div class="stock-visual">
      <div class="sv-item"><div class="sv-label">🔴 Tồn kho khẩn cấp</div><div class="sv-bar-wrap"><div class="sv-bar red" style="width:15%">Đặt hàng NGAY</div></div><div class="sv-val">&lt; 20% Min</div></div>
      <div class="sv-item"><div class="sv-label">🟠 Dưới mức tối thiểu</div><div class="sv-bar-wrap"><div class="sv-bar amber" style="width:30%">Đặt hàng hôm nay</div></div><div class="sv-val">= Mức Min</div></div>
      <div class="sv-item"><div class="sv-label">🟢 Vùng an toàn</div><div class="sv-bar-wrap"><div class="sv-bar green" style="width:65%">Theo lịch đặt hàng</div></div><div class="sv-val">Min → Max</div></div>
      <div class="sv-item"><div class="sv-label">🔵 Đạt mức tối đa</div><div class="sv-bar-wrap"><div class="sv-bar blue" style="width:100%">Tạm dừng đặt hàng</div></div><div class="sv-val">= Mức Max</div></div>
    </div>
    <div class="formula">
      <div class="ft2">📐 Công thức tính mức tồn kho tối thiểu (Min)</div>
      <span class="eq">Tồn kho Min</span> <span class="op">=</span> <span class="var">Doanh số bán trung bình ngày</span> <span class="op">×</span> <span class="var">Thời gian giao hàng (ngày)</span> <span class="op">+</span> <span class="var">Tồn kho an toàn</span><br>
      <span class="note">// Tồn kho an toàn = Doanh số TB ngày × 2 ngày đệm</span>
    </div>
    <div class="formula">
      <div class="ft2">📐 Công thức tính mức tồn kho tối đa (Max)</div>
      <span class="eq">Tồn kho Max</span> <span class="op">=</span> <span class="var">Doanh số bán trung bình ngày</span> <span class="op">×</span> <span class="var">(Chu kỳ đặt hàng + Thời gian giao hàng)</span> <span class="op">+</span> <span class="var">Tồn kho an toàn</span>
    </div>
    <table class="t" style="margin-top:16px;">
      <tr><th>Nhóm hàng</th><th>Chu kỳ đặt hàng</th><th>Thời gian giao (lead time)</th><th>Tồn kho an toàn</th></tr>
      <tr><td>Hàng tươi sống</td><td class="hl">Hàng ngày</td><td>Sáng hôm sau</td><td>1 ngày</td></tr>
      <tr><td>Sữa, thực phẩm chế biến</td><td class="hl">2–3 lần/tuần</td><td>1–2 ngày</td><td>2 ngày</td></tr>
      <tr><td>Hàng khô, FMCG bán nhanh</td><td class="hl">1–2 lần/tuần</td><td>1–3 ngày</td><td>3 ngày</td></tr>
      <tr><td>Hàng khô, FMCG bán chậm</td><td class="hl">1 lần/tuần đến 2 tuần</td><td>2–5 ngày</td><td>5–7 ngày</td></tr>
      <tr><td>Hóa phẩm, gia dụng</td><td class="hl">1 lần/2 tuần</td><td>3–7 ngày</td><td>7 ngày</td></tr>
    </table>
  </div>

  <div id="c3" class="ch"><div class="chl"><span class="dot"></span>CHƯƠNG III</div><h2>Quy Trình Đặt Hàng</h2></div>
  <div class="art">
    <div class="at"><span class="an">3</span>6 bước đặt hàng chuẩn</div>
    <div class="steps">
      <div class="step"><div class="sn2">1</div><div class="sb"><strong>Kiểm tra tồn kho thực tế</strong><p>Đối chiếu tồn kho hệ thống với thực tế kho/kệ. Ghi nhận chênh lệch nếu có trước khi tính lượng đặt.</p></div></div>
      <div class="step"><div class="sn2">2</div><div class="sb"><strong>Phân tích doanh số & xu hướng</strong><p>Xem báo cáo bán hàng 7–14 ngày gần nhất. Xét thêm yếu tố mùa vụ, lễ Tết, sự kiện địa phương nếu có.</p></div></div>
      <div class="step"><div class="sn2">3</div><div class="sb"><strong>Tính lượng đặt hàng</strong><p>Lượng đặt = Tồn kho Max − Tồn kho hiện tại (làm tròn theo đơn vị đặt hàng tối thiểu của NCC).</p></div></div>
      <div class="step"><div class="sn2">4</div><div class="sb"><strong>Lập Đơn Đặt Hàng (PO)</strong><p>Tạo PO trên hệ thống hoặc gửi qua Zalo/app NCC. PO phải ghi rõ: mã hàng, tên hàng, số lượng, đơn giá, ngày giao hàng yêu cầu.</p></div></div>
      <div class="step"><div class="sn2">5</div><div class="sb"><strong>Phê duyệt PO</strong><p>PO dưới 5.000.000đ: Quản lý cửa hàng phê duyệt. PO từ 5.000.000đ trở lên: cần thêm phê duyệt của Giám sát vùng hoặc Phòng Mua hàng.</p></div></div>
      <div class="step"><div class="sn2">6</div><div class="sb"><strong>Xác nhận với NCC & Theo dõi giao hàng</strong><p>Gửi PO đã phê duyệt cho NCC, yêu cầu xác nhận nhận đơn. Ghi vào lịch giao hàng để chuẩn bị nhân lực kiểm hàng.</p></div></div>
    </div>
    <div class="bx rd"><div class="ic">🚫</div><div class="bd2"><strong>Tuyệt đối không đặt hàng không có PO</strong><p>Mọi đơn đặt hàng đều phải có PO được phê duyệt trước. Nhân viên tự ý đặt hàng ngoài hệ thống sẽ bị xử lý kỷ luật và chịu trách nhiệm thanh toán phần hàng không được phê duyệt.</p></div></div>
  </div>

  <div id="c4" class="ch"><div class="chl"><span class="dot"></span>CHƯƠNG IV</div><h2>Lịch Đặt Hàng Theo Ngày Trong Tuần</h2></div>
  <div class="art">
    <div class="at"><span class="an">4</span>Lịch đặt hàng & nhận hàng tham khảo</div>
    <div class="week-grid">
      <div class="day-card order"><div class="dc-name">ĐẶT HÀNG</div><div class="dc-day">T2</div><div class="dc-act">FMCG khô<br>Hóa phẩm</div></div>
      <div class="day-card receive"><div class="dc-name">NHẬN HÀNG</div><div class="dc-day">T3</div><div class="dc-act">Hàng đặt T2<br>Hàng tươi</div></div>
      <div class="day-card order"><div class="dc-name">ĐẶT HÀNG</div><div class="dc-day">T4</div><div class="dc-act">Sữa, thực phẩm<br>chế biến</div></div>
      <div class="day-card receive"><div class="dc-name">NHẬN HÀNG</div><div class="dc-day">T5</div><div class="dc-act">Hàng đặt T4<br>Hàng tươi</div></div>
      <div class="day-card check"><div class="dc-name">KIỂM TỒN</div><div class="dc-day">T6</div><div class="dc-act">Review tồn kho<br>cuối tuần</div></div>
      <div class="day-card order"><div class="dc-name">ĐẶT HÀNG</div><div class="dc-day">T7</div><div class="dc-act">Hàng cho<br>cuối tuần/CN</div></div>
      <div class="day-card receive"><div class="dc-name">NHẬN HÀNG</div><div class="dc-day">CN</div><div class="dc-act">Hàng tươi<br>bổ sung CN</div></div>
    </div>
    <p style="font-size:12.5px;color:var(--ts);">* Lịch trên là khung tham khảo. Quản lý cửa hàng điều chỉnh theo lịch giao hàng thực tế của từng NCC và đặc thù của từng chi nhánh.</p>
    <div class="bx gd"><div class="ic">🎯</div><div class="bd2"><strong>Nguyên tắc đặt hàng cuối tuần & lễ Tết</strong><p>Trước các ngày lễ, Tết hoặc sự kiện lớn → tăng lượng đặt hàng <strong>20–50%</strong> so với ngày thường (tùy loại hàng). Đặt hàng sớm hơn 2–3 ngày so với lịch thường vì NCC cũng tăng khối lượng giao hàng.</p></div></div>
  </div>

  <div id="c5" class="ch"><div class="chl"><span class="dot"></span>CHƯƠNG V</div><h2>Kiểm Soát & Báo Cáo Tồn Kho</h2></div>
  <div class="art">
    <div class="at"><span class="an">5</span>Báo cáo tồn kho định kỳ</div>
    <table class="t">
      <tr><th>Báo cáo</th><th>Nội dung</th><th>Tần suất</th><th>Gửi đến</th></tr>
      <tr><td class="hl">Tồn kho hàng ngày</td><td>Danh sách hàng dưới mức Min; hàng cần đặt bổ sung khẩn</td><td>Cuối mỗi ngày (trước 22:30)</td><td>Nhóm Zalo quản lý</td></tr>
      <tr><td class="hl">Báo cáo tồn tuần</td><td>Top 20 hàng bán chạy; top 10 hàng tồn chậm; tổng giá trị tồn kho</td><td>Thứ 2 hàng tuần trước 9:00</td><td>Giám sát vùng + QLC</td></tr>
      <tr><td class="hl">Báo cáo tồn tháng</td><td>Tổng giá trị tồn, vòng quay hàng tồn kho, hàng sắp hết hạn, đề xuất xử lý hàng chậm luân chuyển</td><td>Ngày 1 hàng tháng</td><td>Phòng Kế toán + BGĐ</td></tr>
    </table>
    <div class="formula">
      <div class="ft2">📐 Chỉ số vòng quay hàng tồn kho (Inventory Turnover)</div>
      <span class="eq">Vòng quay tồn kho</span> <span class="op">=</span> <span class="var">Doanh thu thuần tháng</span> <span class="op">÷</span> <span class="var">Giá trị tồn kho trung bình tháng</span><br>
      <span class="note">// Mục tiêu: ≥ 8 lần/tháng với hàng tươi | ≥ 4 lần/tháng với FMCG | ≥ 2 lần/tháng với hàng chậm</span>
    </div>
  </div>

  <div class="art">
    <div class="at"><span class="an">6</span>Xử lý hàng tồn chậm luân chuyển</div>
    <table class="t">
      <tr><th>Tình trạng</th><th>Định nghĩa</th><th>Hành động</th></tr>
      <tr><td><strong>Hàng chậm (Slow-moving)</strong></td><td>Không bán được trong 30 ngày liên tiếp</td><td>Chuyển ra khu vực hot zone; gắn nhãn nổi bật; báo cáo Phòng Mua hàng xem xét KM</td></tr>
      <tr><td><strong>Hàng ứ đọng (Dead stock)</strong></td><td>Không bán được trong 60 ngày</td><td>Đề xuất giảm giá mạnh, trả NCC (nếu hợp đồng cho phép), hoặc thanh lý</td></tr>
      <tr><td><strong>Hàng gần hết hạn</strong></td><td>Còn ≤ 7 ngày HSD</td><td>Đưa ra vị trí trước nhất, dán nhãn "Sắp hết hạn — Giảm giá ___%"; báo cáo ngay</td></tr>
    </table>
  </div>

  <div id="c6" class="ch"><div class="chl"><span class="dot"></span>CHƯƠNG VI</div><h2>Hiệu Lực & Trách Nhiệm</h2></div>
  <div class="art">
    <div class="at"><span class="an">7</span>Trách nhiệm thực hiện</div>
    <div class="bx bl"><div class="ic">✅</div><div class="bd2"><strong>Hiệu lực từ 01/01/2026.</strong><p>Tỷ lệ hết hàng (stockout rate) và vòng quay tồn kho là 2 trong số các chỉ số KPI tháng của Quản lý cửa hàng. Stockout rate > 5% trong tháng → xem xét điều chỉnh KPI.</p></div></div>
    <table class="t" style="margin-top:14px;">

<nav class="nb"><div class="ni">
  <a href="#c1" class="nl">I. Nguyên tắc an ninh</a>

  <a href="#c6" class="nl">VI. Hiệu lực</a>
</div></nav>
<div class="wp">

  <div id="c1" class="ch"><div class="chl"><span class="dot"></span>CHƯƠNG I</div><h2>Nguyên Tắc An Ninh Cửa Hàng</h2></div>
  <div class="art">
    <div class="at"><span class="an">1</span>Triết lý an ninh VicoMart</div>
    <p>An ninh tại VicoMart không chỉ là bảo vệ tài sản mà còn là bảo vệ <strong>khách hàng, nhân viên và uy tín thương hiệu</strong>. Mọi nhân viên đều là một phần của hệ thống an ninh — quan sát, nhận biết và báo cáo kịp thời là trách nhiệm của tất cả.</p>
    <div class="threat-grid">
      <div class="th-card low">
        <div class="thi">🟢</div>
        <div class="thl">Rủi ro thấp</div>
        <p>Giờ bình thường trong ngày, đủ nhân viên, khách hàng quen thuộc. Duy trì cảnh giác thường xuyên.</p>
      </div>
      <div class="th-card med">
        <div class="thi">🟡</div>
        <div class="thl">Rủi ro trung bình</div>
        <p>Giờ cao điểm, đông khách, sự kiện lớn, cuối tháng. Tăng cường quan sát khu vực hàng có giá trị cao.</p>
      </div>
      <div class="th-card high">
        <div class="thi">🔴</div>
        <div class="thl">Rủi ro cao</div>
        <p>Giờ đóng cửa, nhân viên ít, phát hiện đối tượng khả nghi, đêm khuya. Kích hoạt quy trình an ninh nâng cao.</p>
      </div>
    </div>
  </div>

  <div id="c2" class="ch"><div class="chl"><span class="dot"></span>CHƯƠNG II</div><h2>Hệ Thống Camera Giám Sát (CCTV)</h2></div>
  <div class="art">
    <div class="at"><span class="an">2</span>Vị trí lắp đặt camera bắt buộc</div>
    <div class="cam-grid">
      <div class="cam-card"><div class="cc-icon">🚪</div><div class="cc-zone">Cửa ra vào</div><div class="cc-count">≥ 2 camera</div><p>Bao phủ toàn bộ lối vào/ra, nhận diện khuôn mặt rõ ràng ở khoảng cách 3m.</p></div>
      <div class="cam-card"><div class="cc-icon">💳</div><div class="cc-zone">Quầy thu ngân</div><div class="cc-count">≥ 2 camera</div><p>1 hướng vào mặt thu ngân, 1 hướng vào màn hình POS và tay thu ngân.</p></div>
      <div class="cam-card"><div class="cc-icon">🛒</div><div class="cc-zone">Khu vực bán hàng</div><div class="cc-count">Toàn bộ kệ</div><p>Góc rộng, bao phủ các dãy kệ, không có điểm mù. Đặc biệt khu vực hàng có giá trị cao.</p></div>
      <div class="cam-card"><div class="cc-icon">📦</div><div class="cc-zone">Kho hàng</div><div class="cc-count">≥ 2 camera</div><p>Bao phủ toàn bộ khu vực kho, cửa kho và khu vực nhận hàng NCC.</p></div>
      <div class="cam-card"><div class="cc-icon">🔐</div><div class="cc-zone">Két an toàn</div><div class="cc-count">1 camera</div><p>Hướng vào két, ghi lại toàn bộ thao tác mở/đóng két. Lưu trữ ưu tiên cao nhất.</p></div>
      <div class="cam-card"><div class="cc-icon">🚗</div><div class="cc-zone">Bãi đỗ xe / Bên ngoài</div><div class="cc-count">≥ 2 camera</div><p>Bao phủ bãi đỗ, cửa hông/sau cửa hàng (nếu có). Hỗ trợ điều tra sự cố bên ngoài.</p></div>
    </div>
    <div class="bx bl"><div class="ic">💾</div><div class="bd2">
      <strong>Tiêu chuẩn kỹ thuật camera tối thiểu</strong>
      <ul style="padding-left:18px;margin-top:6px;">
        <li>Độ phân giải: <strong>≥ Full HD 1080p</strong> (khuyến nghị 2K–4K cho khu vực quan trọng).</li>
        <li>Lưu trữ: <strong>tối thiểu 30 ngày</strong> liên tục, không ghi đè trước 30 ngày.</li>
        <li>Hỗ trợ xem từ xa (remote access) cho quản lý cấp vùng và Ban Giám đốc.</li>
        <li>Tự động ghi 24/7, có đèn hồng ngoại cho ban đêm.</li>
        <li>UPS dự phòng điện — camera không được tắt khi mất điện.</li>
      </ul>
    </div></div>
  </div>

  <div class="art">
    <div class="at"><span class="an">3</span>Kiểm tra camera hàng ngày</div>
    <table class="t">
      <tr><th>Thời điểm</th><th>Nội dung kiểm tra</th><th>Người thực hiện</th></tr>
      <tr><td>Đầu ca sáng (06:30)</td><td>Xác nhận tất cả camera đang ghi hình; xem lướt 15 phút cuối đêm để phát hiện bất thường</td><td>Quản lý ca 1</td></tr>
      <tr><td>Cuối ca tối (22:00)</td><td>Xác nhận camera đang ghi trước khi đóng cửa; chụp ảnh màn hình giám sát gửi nhóm Zalo</td><td>Quản lý ca 2</td></tr>
      <tr><td>Hàng tuần (Thứ 2)</td><td>Kiểm tra chất lượng hình ảnh, góc quay, dung lượng lưu trữ còn lại</td><td>Quản lý cửa hàng</td></tr>
      <tr><td>Camera hỏng / bị che khuất</td><td>Báo cáo ngay lập tức, liên hệ kỹ thuật sửa chữa trong vòng 24h</td><td>Người phát hiện → QLC</td></tr>
    </table>
  </div>

  <div id="c3" class="ch"><div class="chl"><span class="dot"></span>CHƯƠNG III</div><h2>Kiểm Soát Ra Vào Cửa Hàng & Khu Vực Nhạy Cảm</h2></div>
  <div class="art">
    <div class="at"><span class="an">4</span>Quy định kiểm soát ra vào</div>
    <table class="t">
      <tr><th>Khu vực</th><th>Ai được vào</th><th>Điều kiện</th></tr>
      <tr><td><strong>Khu vực bán hàng</strong></td><td>Tất cả khách hàng và nhân viên</td><td>Trong giờ mở cửa; đóng cửa chỉ nhân viên trong ca</td></tr>
      <tr><td><strong>Kho hàng</strong></td><td>Nhân viên được phân công; Quản lý; NCC (khi nhận hàng)</td><td>NCC phải có nhân viên VicoMart giám sát, không vào một mình</td></tr>
      <tr><td><strong>Phòng server / Camera</strong></td><td>Quản lý cửa hàng; kỹ thuật được ủy quyền</td><td>Ghi sổ ra vào; không tiếp cận một mình</td></tr>
      <tr><td><strong>Khu vực két an toàn</strong></td><td>Quản lý cửa hàng; Trợ lý quản lý</td><td>Quy tắc 2 người; ghi sổ mỗi lần mở</td></tr>
      <tr><td><strong>Khu vực nghỉ nhân viên</strong></td><td>Chỉ nhân viên đang làm việc</td><td>Không đưa khách hàng hoặc người ngoài vào</td></tr>
    </table>
    <div class="bx rd"><div class="ic">🚫</div><div class="bd2"><strong>Các hành vi bị nghiêm cấm</strong><ul style="padding-left:18px;margin-top:6px;"><li>Cho người thân, bạn bè vào khu vực kho hoặc khu vực nhân viên.</li><li>Để khách hàng ở lại trong cửa hàng sau giờ đóng cửa.</li><li>Tự ý tắt hoặc che khuất camera.</li><li>Chia sẻ mã cửa hoặc chìa khóa cho người không có thẩm quyền.</li></ul></div></div>
  </div>

  <div id="c4" class="ch"><div class="chl"><span class="dot"></span>CHƯƠNG IV</div><h2>Nhận Diện & Xử Lý Trộm Cắp</h2></div>
  <div class="art">
    <div class="at"><span class="an">5</span>Dấu hiệu nhận biết đối tượng khả nghi</div>
    <div class="bx am"><div class="ic">👁️</div><div class="bd2">
      <strong>Quan sát nhưng không đối đầu trực tiếp</strong>
      <p>Nhân viên quan sát và theo dõi bằng cách phục vụ khách — đến hỏi thăm, hỏi cần giúp gì — không được tự ý bắt giữ, khám xét người hoặc túi xách của khách hàng khi chưa có đủ bằng chứng và chưa có sự tham gia của quản lý.</p>
    </div></div>
    <p><strong>Các dấu hiệu cần chú ý:</strong></p>
    <ul>
      <li>Vào cửa hàng nhiều lần trong ngày mà không mua hàng.</li>
      <li>Mang theo túi lớn, mặc quần áo rộng bất thường so với thời tiết.</li>
      <li>Di chuyển về phía khuất camera hoặc góc tối.</li>
      <li>Liên tục nhìn xung quanh, quan sát vị trí nhân viên.</li>
      <li>Tụ tập thành nhóm — một người gây phân tâm, người khác lấy hàng.</li>
      <li>Cầm nhiều sản phẩm rồi để lại chỗ khác (nhằm gây rối loạn kiểm kê).</li>
    </ul>
  </div>

  <div class="art">
    <div class="at"><span class="an">6</span>Quy trình xử lý khi phát hiện trộm cắp</div>
    <div class="steps">
      <div class="step"><div class="sn2">1</div><div class="sb"><strong>Không tự ý hành động — báo quản lý ca ngay lập tức</strong><p>Nhân viên phát hiện nghi ngờ → báo Quản lý ca bằng tín hiệu nội bộ hoặc điện thoại. Không tự ý ngăn cản hay đối đầu với đối tượng.</p></div></div>
      <div class="step"><div class="sn2">2</div><div class="sb"><strong>Tăng cường hiện diện tại khu vực</strong><p>Đến hỏi thăm, chào khách, mời giúp đỡ — giúp đối tượng biết họ đang được chú ý mà không cần đối đầu.</p></div></div>
      <div class="step"><div class="sn2">3</div><div class="sb"><strong>Nếu có bằng chứng rõ ràng — mời làm việc lịch sự</strong><p>Quản lý ca (không phải nhân viên) mời đối tượng ra khu vực riêng một cách lịch sự. Luôn có ít nhất 2 người, không chặn lối đi.</p></div></div>
      <div class="step"><div class="sn2">4</div><div class="sb"><strong>Gọi 113 nếu đối tượng chống cự hoặc bỏ chạy</strong><p>An toàn cá nhân quan trọng hơn tài sản. Không đuổi theo đối tượng ra ngoài cửa hàng.</p></div></div>
      <div class="step"><div class="sn2">5</div><div class="sb"><strong>Lập biên bản & Trích xuất camera</strong><p>Ghi lại toàn bộ sự việc, trích xuất đoạn video liên quan và lưu vào USB/cloud riêng ngay trước khi bị ghi đè.</p></div></div>
      <div class="step"><div class="sn2">6</div><div class="sb"><strong>Báo cáo Ban Giám đốc trong vòng 2 giờ</strong><p>Dù xử lý được hay không, đều phải báo cáo bằng văn bản kèm ảnh/video bằng chứng.</p></div></div>
    </div>
    <div class="bx rd"><div class="ic">⚠️</div><div class="bd2"><strong>Tuyệt đối không được</strong><ul style="padding-left:18px;margin-top:6px;"><li>Tự ý khám xét người hoặc túi của khách hàng — vi phạm pháp luật.</li><li>Dùng vũ lực ngăn chặn đối tượng — nguy hiểm và có thể bị kiện ngược.</li><li>Buộc tội hay xúc phạm khách hàng khi chưa có bằng chứng rõ ràng.</li><li>Đăng video trộm cắp lên mạng xã hội mà chưa có phép của Ban Giám đốc.</li></ul></div></div>
  </div>

  <div id="c5" class="ch"><div class="chl"><span class="dot"></span>CHƯƠNG V</div><h2>Bảo Mật Dữ Liệu Camera</h2></div>
  <div class="art">
    <div class="at"><span class="an">7</span>Quy định truy cập và bảo mật dữ liệu CCTV</div>
    <table class="t">
      <tr><th>Quy định</th><th>Nội dung</th></tr>
      <tr><td class="hl">Ai được xem camera</td><td>Quản lý cửa hàng, Giám sát vùng, Ban Giám đốc, Kỹ thuật được ủy quyền. Nhân viên thường <strong>không</strong> được xem footage camera.</td></tr>
      <tr><td class="hl">Trích xuất dữ liệu</td><td>Chỉ được trích xuất khi có yêu cầu điều tra sự cố, có phê duyệt bằng văn bản của Quản lý cửa hàng. Ghi lại lý do, thời điểm trích xuất vào sổ.</td></tr>
      <tr><td class="hl">Chia sẻ dữ liệu</td><td>Chỉ chia sẻ với cơ quan công an có thẩm quyền khi có văn bản yêu cầu chính thức. Không chia sẻ với bên thứ ba khác.</td></tr>
      <tr><td class="hl">Thông báo cho khách hàng</td><td>Phải có biển thông báo "Khu vực có camera giám sát" tại cửa vào — đây là yêu cầu pháp lý theo Luật Bảo vệ dữ liệu cá nhân.</td></tr>
      <tr><td class="hl">Xóa dữ liệu</td><td>Dữ liệu được xóa tự động sau 30 ngày. Không xóa trước thời hạn trừ khi hết dung lượng và không có sự cố cần điều tra.</td></tr>
    </table>
  </div>

  <div id="c6" class="ch"><div class="chl"><span class="dot"></span>CHƯƠNG VI</div><h2>Hiệu Lực & Trách Nhiệm</h2></div>
  <div class="art">
    <div class="at"><span class="an">8</span>Trách nhiệm thực hiện</div>
    <div class="bx bl"><div class="ic">✅</div><div class="bd2"><strong>Hiệu lực từ 01/01/2026.</strong><p>Giám sát vùng kiểm tra hệ thống camera và tuân thủ an ninh tối thiểu <strong>1 lần/tháng</strong> tại mỗi cửa hàng bằng checklist chuẩn. Camera hỏng không được sửa trong 48h → Quản lý cửa hàng bị ghi vi phạm vận hành.</p></div></div>
    <table class="t" style="margin-top:14px;">
      <tr><th>Vai trò</th><th>Trách nhiệm</th></tr>
      <tr><td class="hl">Toàn bộ nhân viên</td><td>Quan sát và báo cáo kịp thời; không che khuất camera; không tiết lộ sơ hở an ninh.</td></tr>
      <tr><td class="hl">Quản lý ca</td><td>Kiểm tra camera đầu/cuối ca; xử lý tình huống an ninh theo đúng quy trình.</td></tr>
      <tr><td class="hl">Quản lý cửa hàng</td><td>Đảm bảo hệ thống camera hoạt động 24/7; trích xuất dữ liệu khi cần; kiểm tra an ninh hàng tuần.</td></tr>
      <tr><td class="hl">Phòng kỹ thuật IT</td><td>Bảo trì hệ thống camera định kỳ; đảm bảo lưu trữ đủ 30 ngày; hỗ trợ trích xuất dữ liệu.</td></tr>
    </table>
  </div>
</div>
</body>

    <p>Phản ứng nhanh, đúng quy trình — giảm thiểu thiệt hại và bảo vệ thương hiệu</p>

  <div id="c1" class="ch"><div class="chl blue"><span class="dot"></span>CHƯƠNG I</div><h2 class="blue">Phân Loại Sự Cố Theo Mức Độ</h2></div>
  <div class="art">
    <div class="at blue"><span class="an blue">1</span>Ma trận sự cố 3 cấp độ</div>
    <div class="inc-grid">
      <div class="inc-card l1">
        <div class="il">🔴 Cấp độ 1 — Khẩn cấp</div>
        <h4>Xử lý ngay — báo BGĐ trong 30 phút</h4>
        <ul>
          <li>Cháy nổ, tai nạn thương tích nặng</li>
          <li>Trộm cướp có vũ khí</li>
          <li>Mất điện toàn bộ trong giờ cao điểm</li>
          <li>Ngộ độc thực phẩm nghi do hàng VicoMart</li>
          <li>Sự cố lan truyền mạng xã hội nhanh</li>
        </ul>
      </div>
      <div class="inc-card l2">
        <div class="il">🟠 Cấp độ 2 — Nghiêm trọng</div>
        <h4>Báo BGĐ trong 2 giờ</h4>
        <ul>
          <li>Trộm cắp hàng hóa có bằng chứng</li>
          <li>Khách hàng bị thương nhẹ trong cửa hàng</li>
          <li>Thiết bị quan trọng hỏng (tủ lạnh, POS)</li>
          <li>Nhân viên vi phạm nghiêm trọng</li>
          <li>Khiếu nại khách hàng lan rộng (>5 người)</li>
        </ul>
      </div>
      <div class="inc-card l3">
        <div class="il">🟡 Cấp độ 3 — Thông thường</div>
        <h4>Báo cáo cuối ca</h4>
        <ul>
          <li>Khiếu nại khách hàng đơn lẻ đã xử lý</li>
          <li>Thiết bị phụ hỏng (camera 1 góc, cân...)</li>
          <li>Thiếu hụt tiền mặt nhỏ đã xác định nguyên nhân</li>

  <div id="c2" class="ch"><div class="chl blue"><span class="dot"></span>CHƯƠNG II</div><h2 class="blue">Quy Trình Ứng Phó Sự Cố</h2></div>
  <div class="art">
    <div class="at blue"><span class="an blue">2</span>Quy trình 5 bước ứng phó chuẩn</div>
    <div class="steps">
      <div class="step"><div class="sn2">1</div><div class="sb"><strong>NGAY LẬP TỨC — Đảm bảo an toàn con người</strong><p>Ưu tiên tuyệt đối: an toàn khách hàng và nhân viên trước tài sản. Sơ tán nếu cần, gọi cấp cứu 115 nếu có người bị thương.</p></div></div>
      <div class="step"><div class="sn2">2</div><div class="sb"><strong>TRONG 15 PHÚT — Kiểm soát và ngăn chặn leo thang</strong><p>Quản lý ca đến hiện trường, đánh giá mức độ, thực hiện biện pháp khẩn cấp (tắt điện, tách người, khóa khu vực). Giữ bình tĩnh và điều phối nhân viên rõ ràng.</p></div></div>
      <div class="step"><div class="sn2">3</div><div class="sb"><strong>TRONG 30 PHÚT — Thông báo theo chuỗi</strong><p>Báo cáo lên Quản lý cửa hàng → Giám sát vùng → Ban Giám đốc theo mức độ sự cố. Gọi điện trực tiếp, không chỉ nhắn tin.</p></div></div>
      <div class="step"><div class="sn2">4</div><div class="sb"><strong>TRONG 2 GIỜ — Ghi nhận đầy đủ</strong><p>Lập biên bản sự cố: thời gian, địa điểm, diễn biến, nhân chứng, thiệt hại ước tính. Chụp ảnh/video hiện trường. Trích xuất camera liên quan.</p></div></div>
      <div class="step"><div class="sn2">5</div><div class="sb"><strong>TRONG 24 GIỜ — Báo cáo chính thức & Rút kinh nghiệm</strong><p>Báo cáo bằng văn bản đầy đủ gửi Ban Giám đốc. Đề xuất biện pháp khắc phục để sự cố không tái diễn.</p></div></div>
    </div>
    <table class="t" style="margin-top:16px;">
      <tr><th class="blue">Loại sự cố</th><th class="blue">Gọi khẩn</th><th class="blue">Báo nội bộ</th><th class="blue">Không được làm</th></tr>
      <tr><td>Cháy nổ</td><td class="hl">114 → 115 → BGĐ</td><td>Ngay lập tức</td><td>Cố chữa đám cháy lớn; quay phim trước khi sơ tán</td></tr>
      <tr><td>Trộm cướp vũ trang</td><td class="hl">113 → BGĐ</td><td>Sau khi an toàn</td><td>Chống cự; đuổi theo; tiếp cận tên cướp</td></tr>
      <tr><td>Tai nạn thương tích</td><td class="hl">115 → QLC → BGĐ</td><td>Trong 30 phút</td><td>Di chuyển nạn nhân khi nghi chấn thương cột sống</td></tr>
      <tr><td>Mất điện</td><td class="hl">Điện lực → Kỹ thuật</td><td>Trong 15 phút</td><td>Tự sửa điện; để tủ lạnh hở cửa quá 30 phút</td></tr>
      <tr><td>Ngộ độc thực phẩm nghi ngờ</td><td class="hl">115 → BGĐ → Kế toán</td><td>Ngay lập tức</td><td>Xóa dấu vết; tiêu hủy sản phẩm nghi ngờ trước điều tra</td></tr>
    </table>

  <div id="c3" class="ch"><div class="chl blue"><span class="dot"></span>CHƯƠNG III</div><h2 class="blue">Xử Lý Khủng Hoảng Truyền Thông</h2></div>
  <div class="art">
    <div class="at blue"><span class="an blue">3</span>Quy trình ứng phó khủng hoảng truyền thông</div>
    <div class="crisis-steps">
      <div class="cs"><div class="cs-time"><div class="ct">0–1h</div><div class="cl">Giờ vàng</div></div><div class="cs-body"><strong>Phát hiện & Đánh giá</strong><p>Giám sát mạng xã hội phát hiện nội dung tiêu cực về VicoMart → Báo ngay Ban Giám đốc. Đánh giá: thật/giả, mức độ lan truyền, tính chất nội dung.</p></div></div>
      <div class="cs"><div class="cs-time"><div class="ct">1–2h</div><div class="cl">Phân tích</div></div><div class="cs-body"><strong>Xác minh sự thật & Thành lập nhóm xử lý</strong><p>Kiểm tra thông tin nội bộ, camera, hóa đơn liên quan. BGĐ + PR (nếu có) thành lập nhóm xử lý khủng hoảng ngay lập tức.</p></div></div>
      <div class="cs"><div class="cs-time"><div class="ct">2–4h</div><div class="cl">Phản hồi</div></div><div class="cs-body"><strong>Phát ngôn chính thức đầu tiên</strong><p>Đăng thông điệp ngắn gọn trên kênh chính thức VicoMart: "Chúng tôi đã ghi nhận thông tin và đang điều tra. Sẽ có thông báo chính thức trong vòng X giờ." Không im lặng quá 4 giờ.</p></div></div>
      <div class="cs"><div class="cs-time"><div class="ct">4–24h</div><div class="cl">Xử lý</div></div><div class="cs-body"><strong>Thông cáo báo chí / Đính chính đầy đủ</strong><p>Nếu VicoMart có lỗi: thừa nhận, xin lỗi chân thành, nêu biện pháp khắc phục cụ thể. Nếu thông tin sai: đính chính có bằng chứng, lịch sự, không tấn công người đăng.</p></div></div>
      <div class="cs"><div class="cs-time"><div class="ct">24–72h</div><div class="cl">Theo dõi</div></div><div class="cs-body"><strong>Theo dõi & Đóng vấn đề</strong><p>Theo dõi phản ứng cộng đồng. Tiếp tục cập nhật kết quả xử lý. Tổng kết bài học và cập nhật quy trình phòng ngừa.</p></div></div>
    </div>
    <div class="bx rd"><div class="ic">🚫</div><div class="bd2"><strong>Tuyệt đối không được làm trong khủng hoảng TT</strong><ul style="padding-left:18px;margin-top:6px;"><li>Im lặng hoàn toàn — im lặng = thừa nhận trong mắt công chúng.</li><li>Xóa bình luận tiêu cực hàng loạt — làm tăng nghi ngờ và giận dữ.</li><li>Tấn công hoặc chế giễu người đăng thông tin.</li><li>Nhân viên tự ý phát ngôn thay mặt công ty trên mạng xã hội.</li><li>Cung cấp thông tin sai lệch hoặc hứa hẹn điều không thể thực hiện.</li></ul></div></div>

  <!-- PHẦN II: MẠNG XÃ HỘI -->
  <div id="p2" class="part-div purp">

  <div id="c4" class="ch"><div class="chl purp"><span class="dot"></span>CHƯƠNG IV</div><h2 class="purp">Quy Định Sử Dụng Mạng Xã Hội</h2></div>

  <div class="art">

</style>
</head>

  d19: {html:`<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quy Trình Off-boarding & Chế Độ Phúc Lợi | VicoMart Retail</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  :root{--p:#0a3d6b;--pm:#1565c0;--pl:#1e88e5;--pp:#e8f1fb;--pa:#2979ff;--gold:#c9a84c;--gl:#fdf3d8;--red:#c0392b;--rl:#fdecea;--amb:#d35400;--al:#fef0e6;--grn:#1a7a3c;--grl:#e8f7ef;--purple:#6c3483;--purp-lt:#f5eef8;--td:#1a1a1a;--tm:#3d3d3d;--ts:#6b7280;--bg:#f5f8fd;--wh:#fff;--bd:#c5d8f0;--r:12px;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Be Vietnam Pro',sans-serif;background:var(--bg);color:var(--td);line-height:1.75;font-size:15px;}
  .hdr{background:linear-gradient(140deg,#051e3e 0%,#0a3d6b 45%,#1565c0 100%);color:#fff;position:relative;overflow:hidden;}
  .hdr::before{content:'';position:absolute;top:-100px;right:-100px;width:400px;height:400px;background:rgba(255,255,255,.04);border-radius:50%;}
  .hi{max-width:980px;margin:0 auto;padding:50px 32px 42px;position:relative;z-index:1;}
  .ht{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:24px;}
  .bdg{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);border-radius:8px;padding:7px 16px;font-size:12.5px;font-weight:700;}
  .dr{text-align:right;font-size:12px;color:rgba(255,255,255,.65);line-height:1.8;}
  .hdr h1{font-family:'Playfair Display',serif;font-size:clamp(20px,3.5vw,34px);font-weight:700;line-height:1.2;margin-bottom:6px;}
  .hs{font-size:13px;color:rgba(255,255,255,.72);margin-bottom:22px;}
  .tgs{display:flex;gap:10px;flex-wrap:wrap;}
  .tg{background:rgba(255,255,255,.14);border-radius:20px;padding:4px 14px;font-size:12px;font-weight:500;}
  .nb{background:var(--wh);border-bottom:2px solid var(--bd);position:sticky;top:0;z-index:200;box-shadow:0 2px 14px rgba(0,0,0,.07);}
  .ni{max-width:980px;margin:0 auto;padding:0 32px;display:flex;overflow-x:auto;scrollbar-width:none;}
  .ni::-webkit-scrollbar{display:none;}
  .nl{display:block;padding:13px 15px;font-size:12.5px;font-weight:600;color:var(--ts);text-decoration:none;white-space:nowrap;border-bottom:3px solid transparent;transition:all .2s;}
  .nl:hover{color:var(--pm);border-bottom-color:var(--pm);}
  .wp{max-width:980px;margin:0 auto;padding:44px 32px 90px;}
  .ch{margin-top:56px;margin-bottom:6px;}
  .chl{display:inline-flex;align-items:center;gap:10px;color:#fff;padding:6px 20px 6px 14px;border-radius:4px 20px 20px 4px;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;}
  .chl.blue{background:var(--p);}.chl.gold{background:#8a6914;}
  .chl .dot{width:8px;height:8px;border-radius:50%;}
  .chl.blue .dot{background:var(--pa);}.chl.gold .dot{background:#f5d78e;}
  .ch h2{font-size:20px;font-weight:800;padding-left:14px;line-height:1.3;}
  .ch h2.blue{color:var(--p);border-left:4px solid var(--pl);}
  .ch h2.gold{color:#8a6914;border-left:4px solid var(--gold);}
  .part-div{padding:20px 32px;margin:48px 0 0;border-radius:var(--r);text-align:center;color:#fff;}
  .part-div.blue{background:linear-gradient(135deg,var(--p),var(--pm));}
  .part-div.gold{background:linear-gradient(135deg,#6d4c00,#c9a84c);}
  .part-div h2{font-size:18px;font-weight:800;margin-bottom:4px;}
  .part-div p{font-size:13px;color:rgba(255,255,255,.75);margin:0;}
  .art{background:var(--wh);border:1px solid var(--bd);border-radius:var(--r);padding:28px 32px;margin-top:20px;transition:box-shadow .2s;}
  .art:hover{box-shadow:0 4px 22px rgba(10,61,107,.08);}
  .at{font-size:15.5px;font-weight:700;display:flex;align-items:center;gap:10px;margin-bottom:18px;}
  .at.blue{color:var(--p);}.at.gold{color:#8a6914;}
  .an{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;font-size:12px;font-weight:800;flex-shrink:0;}
  .an.blue{background:var(--pp);color:var(--p);}.an.gold{background:var(--gl);color:#8a6914;}
  .t{width:100%;border-collapse:collapse;margin:14px 0;font-size:14px;}
  .t th{color:#fff;padding:10px 15px;text-align:left;font-weight:600;font-size:13px;}
  .t th.blue{background:var(--p);}.t th.gold{background:#8a6914;}
  .t th:first-child{border-radius:8px 0 0 0;}.t th:last-child{border-radius:0 8px 0 0;}
  .t td{padding:10px 15px;border-bottom:1px solid var(--bd);color:var(--tm);vertical-align:top;}
  .t tr:nth-child(even) td{background:var(--pp);}
  .t tr.gd-row:nth-child(even) td{background:#fef9e7;}
  .t .hl{font-weight:700;color:var(--p);}
  .t .ghl{font-weight:700;color:#8a6914;}
  .t .rd{font-weight:700;color:var(--red);}
  .bx{border-radius:10px;padding:16px 20px;margin:14px 0;display:flex;gap:14px;align-items:flex-start;}
  .bx.bl{background:var(--pp);border-left:4px solid var(--pl);}
  .bx.gd{background:var(--gl);border-left:4px solid var(--gold);}
  .bx.rd{background:var(--rl);border-left:4px solid var(--red);}
  .bx.am{background:var(--al);border-left:4px solid var(--amb);}
  .bx.gr{background:var(--grl);border-left:4px solid var(--grn);}
  .bx .ic{font-size:20px;flex-shrink:0;margin-top:2px;}
  .bx .bd2{flex:1;font-size:14px;color:var(--tm);}
  .bx .bd2 strong{display:block;margin-bottom:4px;color:var(--td);}
  /* OFFBOARD CHECKLIST */
  .off-check{list-style:none;padding:0;margin:14px 0;}
  .off-check li{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--bd);}
  .off-check li:last-child{border-bottom:none;}
  .oc-box{width:22px;height:22px;border:2px solid var(--bd);border-radius:5px;flex-shrink:0;margin-top:2px;}
  .oc-body{flex:1;}
  .oc-body strong{font-size:14px;color:var(--td);display:block;margin-bottom:2px;}
  .oc-body span{font-size:13px;color:var(--ts);}
  .oc-who{flex:0 0 100px;text-align:right;font-size:12px;font-weight:600;color:var(--pm);}
  /* BENEFITS CARDS */
  .ben-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin:16px 0;}
  .ben-card{border-radius:10px;padding:18px;border:1px solid var(--bd);background:var(--wh);text-align:center;}
  .ben-card .bi{font-size:28px;margin-bottom:8px;}
  .ben-card .bt{font-size:13px;font-weight:700;color:var(--p);margin-bottom:6px;}
  .ben-card .bv{font-size:15px;font-weight:800;color:var(--gold);margin-bottom:4px;}
  .ben-card .bd2{font-size:12px;color:var(--ts);}
  /* BHXH TABLE */
  .bhxh-table{width:100%;border-collapse:collapse;margin:14px 0;font-size:14px;}
  .bhxh-table th{background:#2e7d32;color:#fff;padding:10px 15px;text-align:left;font-size:13px;font-weight:600;}
  .bhxh-table th:first-child{border-radius:8px 0 0 0;}.bhxh-table th:last-child{border-radius:0 8px 0 0;}
  .bhxh-table td{padding:10px 15px;border-bottom:1px solid #c8e6c9;color:var(--tm);}
  .bhxh-table tr:nth-child(even) td{background:#f1f8e9;}
  .bhxh-table .nld{font-weight:700;color:#c0392b;}

  <div id="c1" class="ch"><div class="chl blue"><span class="dot"></span>CHƯƠNG I</div><h2 class="blue">Các Trường Hợp Chấm Dứt Hợp Đồng</h2></div>

  <div id="c2" class="ch"><div class="chl blue"><span class="dot"></span>CHƯƠNG II</div><h2 class="blue">Checklist Bàn Giao Công Việc</h2></div>

      <li><div class="oc-box"></div><div class="oc-body"><strong>Xóa quyền truy cập hệ thống</strong><span>Phòng IT vô hiệu hóa tài khoản POS, hệ thống kho, email nội bộ, Zalo nhóm công việc trong vòng 24h sau khi nhận thông báo nghỉ việc.</span></div><div class="oc-who">Phòng IT</div></li>
      <li><div class="oc-box"></div><div class="oc-body"><strong>Ký biên bản bàn giao</strong><span>Cả NLĐ và Quản lý cửa hàng ký biên bản bàn giao xác nhận đã hoàn thành toàn bộ nghĩa vụ bàn giao.</span></div><div class="oc-who">NLĐ + QLC + NS</div></li>
